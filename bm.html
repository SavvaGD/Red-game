<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Блю — собака-нейросеть с диалогами</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a2a1a, #0a1a2a);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 20px; }
        h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #6ee7ff, #3b82f6, #1e3a8a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .sub { color: #cbd5e6; font-size: 0.8rem; }
        .top-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .top-btn {
            background: #1e293b;
            border: 1px solid #3b82f6;
            border-radius: 40px;
            padding: 8px 20px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        .top-btn:hover { background: #3b82f6; }
        .microphone-status {
            display: inline-block;
            background: #f59e0b;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 0.7rem;
            margin-left: 10px;
            color: white;
        }
        .main-panel { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
        .room-panel {
            flex: 1.2;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            padding: 20px;
            backdrop-filter: blur(8px);
            border: 1px solid #3b82f6;
        }
        .room-title { font-size: 0.9rem; color: #bbd7ff; margin-bottom: 15px; }
        .room-canvas-container {
            background: #0a0f1a;
            border-radius: 24px;
            padding: 10px;
            border: 2px solid #3b82f6;
        }
        canvas {
            width: 100%;
            background: #1a2a3a;
            border-radius: 20px;
            display: block;
        }
        .mushroom-panel {
            flex: 0.8;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
        }
        .mushroom {
            position: relative;
            width: 200px;
            height: 240px;
            margin: 0 auto;
            cursor: pointer;
            transition: all 0.3s;
        }
        .mushroom.hidden {
            opacity: 0;
            transform: scale(0.8);
        }
        .mushroom-hat {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 110px;
            background: radial-gradient(ellipse at 30% 30%, #3b82f6, #1e3a8a);
            border-radius: 50% 50% 45% 45%;
        }
        .mushroom-stem {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 90px;
            background: linear-gradient(135deg, #e8e0c8, #c8c0a8);
            border-radius: 30px 30px 20px 20px;
        }
        .mushroom-face {
            position: absolute;
            bottom: 55px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            text-align: center;
        }
        .eyes { display: flex; gap: 15px; justify-content: center; margin-bottom: 5px; }
        .eye { width: 16px; height: 16px; background: white; border-radius: 50%; }
        .pupil { width: 8px; height: 8px; background: #1a1a2e; border-radius: 50%; margin: 4px auto 0; }
        .mouth { font-size: 20px; }
        .stats { display: flex; justify-content: center; gap: 15px; margin: 15px 0; flex-wrap: wrap; }
        .stat { background: rgba(0,0,0,0.6); border-radius: 30px; padding: 5px 15px; font-size: 0.7rem; color: #cbd5e6; }
        .stat span { color: #6ee7ff; font-weight: bold; }
        .chat-panel { background: rgba(0,0,0,0.5); border-radius: 30px; padding: 20px; }
        .messages { height: 280px; overflow-y: auto; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 85%; padding: 10px 15px; border-radius: 20px; font-size: 0.85rem; word-wrap: break-word; color: white; }
        .user-message { align-self: flex-end; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
        .blue-message { align-self: flex-start; background: #1e293b; color: white; border-left: 3px solid #3b82f6; }
        .system-message { align-self: center; background: #4a2a0a; color: #ffd700; font-size: 0.7rem; text-align: center; max-width: 95%; }
        .learning-panel {
            background: #0a0f1a;
            border-radius: 20px;
            padding: 15px;
            margin-top: 15px;
            border: 1px solid #f59e0b;
        }
        .learning-title { color: #f59e0b; font-size: 0.8rem; margin-bottom: 10px; }
        .command-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .command-badge {
            background: #1e293b;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.7rem;
            color: #6ee7ff;
            border: 1px solid #3b82f6;
            cursor: pointer;
        }
        .chat-input {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .chat-input input {
            flex: 1;
            background: #0e1625;
            border: 2px solid #3b82f6;
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            font-size: 0.9rem;
        }
        .chat-input input:focus { outline: none; border-color: #f59e0b; }
        .chat-input button {
            background: linear-gradient(135deg, #3b82f6, #1e3a8a);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        select, .action-input {
            background: #0e1625;
            border: 1px solid #3b82f6;
            border-radius: 20px;
            padding: 8px 12px;
            color: white;
            margin: 5px;
        }
        .action-config {
            background: #0a0f1a;
            border-radius: 16px;
            padding: 12px;
            margin-top: 10px;
        }
        .save-btn {
            background: #10b981;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }
        .delete-btn {
            background: #ef4444;
            border: none;
            padding: 4px 10px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 0.7rem;
            margin-left: 10px;
        }
        @keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
        .bounce { animation: bounce 0.3s ease; }
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 75%{transform:translateX(5px);} }
        .shake { animation: shake 0.2s ease; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🐶 БЛЮ <span class="microphone-status" id="micStatus">🎤 микрофон выкл</span></h1>
        <div class="sub">собака-нейросеть · учится командам · диалоги с ветвлением</div>
    </div>

    <div class="top-bar">
        <button class="top-btn" id="startMicBtn">🎤 Включить микрофон</button>
        <button class="top-btn" id="stopMicBtn">⏹️ Выключить микрофон</button>
        <button class="top-btn" id="exportBtn">💾 Сохранить Блю</button>
        <label class="top-btn" style="display:inline-block; cursor:pointer;">📂 Загрузить Блю
            <input type="file" id="importFile" accept=".blmu" style="display:none;">
        </label>
    </div>

    <div class="main-panel">
        <div class="room-panel">
            <div class="room-title">🏠 КОМНАТА БЛЮ</div>
            <div class="room-canvas-container">
                <canvas id="roomCanvas" width="600" height="350"></canvas>
            </div>
        </div>

        <div class="mushroom-panel">
            <div class="mushroom" id="mushroom">
                <div class="mushroom-hat"></div>
                <div class="mushroom-stem"></div>
                <div class="mushroom-face">
                    <div class="eyes"><div class="eye"><div class="pupil"></div></div><div class="eye"><div class="pupil"></div></div></div>
                    <div class="mouth" id="mouth">😊</div>
                </div>
            </div>
            <div class="stats">
                <div class="stat">🐶 Команд: <span id="commandsCount">0</span></div>
                <div class="stat">😊 Настроение: <span id="mood">100</span></div>
            </div>
        </div>
    </div>

    <div class="chat-panel">
        <div class="messages" id="messages">
            <div class="message blue-message">🐶 Гав! Я Блю. Научи меня командам! Напиши "Запомни" и следуй инструкциям. Ещё я боюсь громких звуков — микрофон слушает!</div>
        </div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Скажи что-нибудь Блю или напиши 'Запомни'..." onkeypress="if(event.key==='Enter') send()">
            <button id="sendBtn">💬</button>
        </div>
    </div>

    <div class="learning-panel" id="learningPanel" style="display:none;">
        <div class="learning-title">📚 ОБУЧЕНИЕ БЛЮ — шаг <span id="stepNum">1</span>/<span id="stepTotal">1</span></div>
        <div id="learningContent"></div>
    </div>
</div>

<script>
    // Реакции Блю
    const REACTIONS = {
        'спрятаться': () => {},
        'сесть': 'bounce',
        'лечь': 'lie',
        'прыгнуть': 'bounce',
        'вилять хвостом': 'shake',
        'лаять': 'bark',
        'принести': 'bounce',
        'крутиться': 'spin',
        'лежать': 'lie',
        'спать': 'sleep',
        'чесаться': 'shake',
        'улыбнуться': 'smile'
    };
    
    class BlueDog {
        constructor() {
            this.commands = {};
            this.builtinCommands = ['запомни', 'привет', 'как дела', 'спасибо', 'пока', 'отмена'];
            this.isLearning = false;
            this.learningStep = 0;
            this.learningData = { actions: [] };
            this.isHidden = false;
            this.hideTimeout = null;
            this.mediaStream = null;
            this.audioContext = null;
            this.microphoneEnabled = false;
            this.waitingForQuestion = null;
            
            this.initUI();
            this.setupCanvas();
            this.drawRoom();
            this.loadFromLocal();
            this.updateCommandsDisplay();
        }
        
        initUI() {
            this.roomCanvas = document.getElementById('roomCanvas');
            this.ctx = this.roomCanvas.getContext('2d');
            this.messagesDiv = document.getElementById('messages');
            this.userInput = document.getElementById('userInput');
            this.commandsCountSpan = document.getElementById('commandsCount');
            this.moodSpan = document.getElementById('mood');
            this.mouth = document.getElementById('mouth');
            this.mushroomDiv = document.getElementById('mushroom');
            this.learningPanel = document.getElementById('learningPanel');
            this.learningContent = document.getElementById('learningContent');
            this.stepNumSpan = document.getElementById('stepNum');
            this.stepTotalSpan = document.getElementById('stepTotal');
            this.micStatusSpan = document.getElementById('micStatus');
        }
        
        setupCanvas() {
            const container = this.roomCanvas.parentElement;
            const width = Math.min(500, container.clientWidth - 20);
            this.roomCanvas.width = width;
            this.roomCanvas.height = width * 0.58;
        }
        
        drawRoom() {
            if(!this.ctx) return;
            this.ctx.fillStyle = "#1a2a3a";
            this.ctx.fillRect(0, 0, this.roomCanvas.width, this.roomCanvas.height);
            this.ctx.fillStyle = "#2a3a2a";
            this.ctx.fillRect(0, this.roomCanvas.height - 60, this.roomCanvas.width, 60);
            this.ctx.fillStyle = "#3b82f6";
            this.ctx.font = "30px monospace";
            this.ctx.fillText("🐶", this.roomCanvas.width/2 - 20, this.roomCanvas.height/2);
        }
        
        // === МИКРОФОН ===
        async startMicrophone() {
            try {
                this.mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = this.audioContext.createMediaStreamSource(this.mediaStream);
                const analyser = this.audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                this.microphoneEnabled = true;
                this.micStatusSpan.innerText = "🎤 слушаю";
                this.micStatusSpan.style.background = "#10b981";
                const checkVolume = () => {
                    if (!this.microphoneEnabled) return;
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                    let avg = sum / dataArray.length;
                    if (avg > 50) this.hide();
                    requestAnimationFrame(checkVolume);
                };
                checkVolume();
                this.addMessage("🎤 Микрофон включён! Громкие звуки пугают Блю.", "system");
            } catch(e) {
                this.addMessage("❌ Не удалось включить микрофон: " + e.message, "system");
            }
        }
        
        stopMicrophone() {
            if (this.mediaStream) {
                this.mediaStream.getTracks().forEach(track => track.stop());
                this.mediaStream = null;
            }
            if (this.audioContext) {
                this.audioContext.close();
                this.audioContext = null;
            }
            this.microphoneEnabled = false;
            this.micStatusSpan.innerText = "🎤 микрофон выкл";
            this.micStatusSpan.style.background = "#f59e0b";
            this.addMessage("🎤 Микрофон выключен.", "system");
        }
        
        hide() {
            if (this.hideTimeout) clearTimeout(this.hideTimeout);
            this.isHidden = true;
            this.mushroomDiv.classList.add('hidden');
            this.addMessage("🔊 ГРОМКИЙ ЗВУК! Блю прячется... 😨", "blue");
            this.moodSpan.innerText = Math.max(0, parseInt(this.moodSpan.innerText) - 10);
            this.hideTimeout = setTimeout(() => {
                this.isHidden = false;
                this.mushroomDiv.classList.remove('hidden');
                this.addMessage("🐶 Блю выглядывает... Вроде тихо.", "blue");
            }, 3000);
        }
        
        // === ДЕЙСТВИЯ ===
        performAction(action) {
            if(!action) return;
            switch(action.type) {
                case 'text':
                    this.addMessage(`🐶 ${action.text}`, "blue");
                    break;
                case 'music':
                    this.playMusic(action.notes);
                    break;
                case 'reaction':
                    this.doReaction(action.reaction);
                    break;
                case 'question':
                    this.startQuestion(action);
                    break;
                case 'multi':
                    this.executeMultiAction(action.actions);
                    break;
            }
        }
        
        playMusic(notes) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            const noteFreq = { 'C':261.63, 'D':293.66, 'E':329.63, 'F':349.23, 'G':392.00, 'A':440.00, 'B':493.88 };
            const parts = notes.split(' ');
            let time = ctx.currentTime;
            for(const part of parts) {
                const match = part.match(/([A-G])(\d)/);
                if(match) {
                    const note = match[1];
                    const octave = parseInt(match[2]);
                    const freq = noteFreq[note] * Math.pow(2, octave - 4);
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.2, time);
                    gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.3);
                    osc.start(time);
                    osc.stop(time + 0.3);
                    time += 0.3;
                }
            }
            this.addMessage(`🐶 *играет мелодию* ${notes}`, "blue");
        }
        
        doReaction(reaction) {
            switch(reaction) {
                case 'спрятаться': this.hide(); break;
                case 'сесть': this.animate('bounce'); break;
                case 'лечь': this.animate('lie'); break;
                case 'прыгнуть': this.animate('bounce'); break;
                case 'вилять хвостом': this.animate('shake'); break;
                case 'лаять': this.addMessage("🐶 ГАВ-ГАВ-ГАВ!", "blue"); break;
                case 'принести': this.addMessage("🐶 *приносит палку* Гав! Держи!", "blue"); this.animate('bounce'); break;
                case 'крутиться': this.animate('spin'); break;
                case 'лежать': this.animate('lie'); break;
                case 'спать': this.mouth.innerText = "💤"; setTimeout(() => this.mouth.innerText = "😊", 2000); break;
                case 'чесаться': this.animate('shake'); break;
                case 'улыбнуться': this.mouth.innerText = "😁"; setTimeout(() => this.mouth.innerText = "😊", 1500); break;
                default: this.addMessage(`🐶 *${reaction}*`, "blue");
            }
        }
        
        executeMultiAction(actions) {
            let i = 0;
            const next = () => {
                if(i >= actions.length) return;
                this.performAction(actions[i]);
                i++;
                setTimeout(next, 1500);
            };
            next();
        }
        
        startQuestion(questionAction) {
            this.addMessage(`🐶 ${questionAction.question}`, "blue");
            this.waitingForQuestion = questionAction;
        }
        
        answerQuestion(userAnswer) {
            if(!this.waitingForQuestion) return false;
            const q = this.waitingForQuestion;
            const lowerAnswer = userAnswer.toLowerCase();
            let matched = false;
            for(const ans of q.answers) {
                if(lowerAnswer === ans.text.toLowerCase()) {
                    this.performAction(ans.action);
                    matched = true;
                    break;
                }
            }
            if(!matched && q.wrongAction) {
                this.performAction(q.wrongAction);
            }
            this.waitingForQuestion = null;
            return true;
        }
        
        // === КОМАНДЫ ===
        executeCommand(command, originalText) {
            const lower = command.toLowerCase();
            
            if(lower === 'привет') { this.addMessage("🐶 Гав! Привет!", "blue"); return true; }
            if(lower === 'как дела') { this.addMessage("🐶 Гав-гав! У меня всё отлично! А у тебя?", "blue"); return true; }
            if(lower === 'спасибо') { this.addMessage("🐶 *виляет хвостом* Гав! Пожалуйста!", "blue"); return true; }
            if(lower === 'пока') { this.addMessage("🐶 Гав! Пока, заходи ещё!", "blue"); return true; }
            
            for(const [cmd, action] of Object.entries(this.commands)) {
                if(lower === cmd.toLowerCase()) {
                    this.performAction(action);
                    return true;
                }
            }
            return false;
        }
        
        // === ОБУЧЕНИЕ ===
        startLearning() {
            this.isLearning = true;
            this.learningStep = 1;
            this.learningData = { actions: [] };
            this.learningPanel.style.display = "block";
            this.showLearningStep();
        }
        
        showLearningStep() {
            if(!this.isLearning) return;
            if(this.learningStep === 1) {
                this.stepNumSpan.innerText = "1";
                this.stepTotalSpan.innerText = "2";
                this.learningContent.innerHTML = `
                    <div>Введи команду (например: "сидеть", "голос", "диалог"):</div>
                    <input type="text" id="newCommand" class="action-input" style="width:100%; margin-top:10px;" placeholder="команда">
                    <button class="save-btn" onclick="blue.setCommand()">Далее</button>
                `;
            } else if(this.learningStep === 2) {
                this.stepNumSpan.innerText = "2";
                this.stepTotalSpan.innerText = "2";
                this.learningContent.innerHTML = `
                    <div>Выбери тип действия для команды "${this.learningData.command}":</div>
                    <select id="actionType" class="action-input">
                        <option value="text">📝 Текстовый ответ</option>
                        <option value="music">🎵 Музыкальный ответ</option>
                        <option value="reaction">🎭 Реакция</option>
                        <option value="question">❓ Вопрос (диалог)</option>
                        <option value="multi">🔗 Множественное действие</option>
                    </select>
                    <div id="actionConfig" class="action-config"></div>
                    <button class="save-btn" onclick="blue.saveAction()">Сохранить команду</button>
                `;
                this.updateActionConfig();
                document.getElementById('actionType').addEventListener('change', () => this.updateActionConfig());
            }
        }
        
        updateActionConfig() {
            const type = document.getElementById('actionType').value;
            const configDiv = document.getElementById('actionConfig');
            if(type === 'text') {
                configDiv.innerHTML = `<input type="text" id="textResponse" class="action-input" style="width:100%" placeholder="Текст ответа (например: сижу)">`;
            } else if(type === 'music') {
                configDiv.innerHTML = `<input type="text" id="musicNotes" class="action-input" style="width:100%" placeholder="Ноты (например: F5 G3 D6)">`;
            } else if(type === 'reaction') {
                configDiv.innerHTML = `
                    <select id="reactionType" class="action-input">
                        <option value="спрятаться">🙈 спрятаться</option>
                        <option value="сесть">🪑 сесть</option>
                        <option value="лечь">😴 лечь</option>
                        <option value="прыгнуть">🦘 прыгнуть</option>
                        <option value="вилять хвостом">🐕 вилять хвостом</option>
                        <option value="лаять">🔊 лаять</option>
                        <option value="принести">🎾 принести</option>
                        <option value="крутиться">🔄 крутиться</option>
                        <option value="лежать">🛌 лежать</option>
                        <option value="спать">💤 спать</option>
                        <option value="чесаться">🐾 чесаться</option>
                        <option value="улыбнуться">😁 улыбнуться</option>
                    </select>
                `;
            } else if(type === 'question') {
                configDiv.innerHTML = `
                    <input type="text" id="questionText" class="action-input" style="width:100%" placeholder="Вопрос (например: ты гей?)"><br>
                    <div id="answersList"></div>
                    <button class="save-btn" style="background:#3b82f6;" onclick="blue.addAnswerField()">➕ Добавить ожидаемый ответ</button><br>
                    <div style="margin-top:15px;"><b>Действие при неожиданном ответе:</b></div>
                    <div id="wrongActionConfig"></div>
                `;
                this.addAnswerField();
                this.updateWrongActionConfig();
            } else if(type === 'multi') {
                configDiv.innerHTML = `
                    <div id="multiActionsList"></div>
                    <button class="save-btn" style="background:#3b82f6;" onclick="blue.addMultiActionField()">➕ Добавить действие</button>
                `;

        setCommand() {
            const cmd = document.getElementById('newCommand').value.trim();
            if(!cmd) { this.addMessage("❌ Введи команду!", "system"); return; }
            if(this.builtinCommands.includes(cmd.toLowerCase())) {
                this.addMessage("❌ Это встроенная команда! Придумай другую.", "system");
                return;
            }
            if(this.commands[cmd]) {
                this.addMessage("❌ Такая команда уже есть! Придумай другую.", "system");
                return;
            }
            this.learningData.command = cmd;
            this.learningStep = 2;
            this.showLearningStep();
        }
        
        saveAction() {
            const type = document.getElementById('actionType').value;
            let action = { type: type };
            
            if(type === 'text') {
                action.text = document.getElementById('textResponse').value;
                if(!action.text) { this.addMessage("❌ Введи текст ответа!", "system"); return; }
            } else if(type === 'music') {
                action.notes = document.getElementById('musicNotes').value;
                if(!action.notes) { this.addMessage("❌ Введи ноты!", "system"); return; }
            } else if(type === 'reaction') {
                action.reaction = document.getElementById('reactionType').value;
            } else if(type === 'question') {
                action.question = document.getElementById('questionText').value;
                action.answers = [];
                const answerDivs = document.querySelectorAll('#answersList > div');
                for(const div of answerDivs) {
                    const id = div.id.replace('answerDiv', '');
                    const ansText = document.getElementById(`answerText${id}`)?.value;
                    if(ansText) {
                        const ansType = document.getElementById(`answerActionType${id}`).value;
                        let ansValue = document.getElementById(`answerActionValue${id}`)?.value;
                        if(ansType === 'question') ansValue = { type: 'question', question: 'Вопрос', answers: [], wrongAction: null };
                        action.answers.push({ text: ansText, action: { type: ansType, [ansType === 'text' ? 'text' : (ansType === 'music' ? 'notes' : 'reaction')]: ansValue } });
                    }
                }
                const wrongType = document.getElementById('wrongActionType').value;
                const wrongValue = document.getElementById('wrongActionValue').value;
                if(wrongValue) {
                    action.wrongAction = { type: wrongType, [wrongType === 'text' ? 'text' : (wrongType === 'music' ? 'notes' : 'reaction')]: wrongValue };
                }
            } else if(type === 'multi') {
                action.actions = [];
                const multiDivs = document.querySelectorAll('#multiActionsList > div');
                for(const div of multiDivs) {
                    const id = div.id.replace('multiDiv', '');
                    const actType = document.getElementById(`multiActionType${id}`).value;
                    let actValue = document.getElementById(`multiActionValue${id}`)?.value;
                    if(actType === 'question') {
                        const answers = [];
                        const ansContainer = document.getElementById(`multiQuestionAnswers${id}`);
                        if(ansContainer) {
                            const ansDivs = ansContainer.querySelectorAll('div');
                            for(const ansDiv of ansDivs) {
                                const ansIdMatch = ansDiv.id.match(/multiQAns(\d+)_(\d+)/);
                                if(ansIdMatch) {
                                    const aId = ansIdMatch[2];
                                    const ansText = document.getElementById(`multiQAnsText${id}_${aId}`)?.value;
                                    const ansType = document.getElementById(`multiQAnsType${id}_${aId}`).value;
                                    const ansValue = document.getElementById(`multiQAnsValue${id}_${aId}`)?.value;
                                    if(ansText && ansValue) {
                                        answers.push({ text: ansText, action: { type: ansType, [ansType === 'text' ? 'text' : (ansType === 'music' ? 'notes' : 'reaction')]: ansValue } });
                                    }
                                }
                            }
                        }
                        actValue = { type: 'question', question: actValue, answers: answers, wrongAction: null };
                    }
                    if(actValue) action.actions.push(actValue);
                }
            }
            
            this.commands[this.learningData.command] = action;
            this.updateCommandsDisplay();
            this.addMessage(`🐶 Гав! Я запомнил команду "${this.learningData.command}"!`, "blue");
            this.cancelLearning();
            this.saveToLocal();
        }
        
        updateCommandsDisplay() {
            this.commandsCountSpan.innerText = Object.keys(this.commands).length;
        }
        
        cancelLearning() {
            this.isLearning = false;
            this.learningPanel.style.display = "none";
            this.learningData = {};
            this.waitingForQuestion = null;
        }
        
        animate(anim) {
            if(anim === 'bounce') {
                this.mushroomDiv.classList.add('bounce');
                setTimeout(() => this.mushroomDiv.classList.remove('bounce'), 500);
            } else if(anim === 'shake') {
                this.mushroomDiv.classList.add('shake');
                setTimeout(() => this.mushroomDiv.classList.remove('shake'), 500);
            } else if(anim === 'lie') {
                this.mushroomDiv.style.transform = 'scaleX(0.8)';
                setTimeout(() => this.mushroomDiv.style.transform = '', 1000);
            } else if(anim === 'spin') {
                this.mushroomDiv.style.transform = 'rotate(360deg)';
                setTimeout(() => this.mushroomDiv.style.transform = '', 500);
            }
        }
        
        saveToLocal() {
            const data = { commands: this.commands, version: 1, date: new Date().toISOString() };
            localStorage.setItem('blue_dog', JSON.stringify(data));
        }
        
        loadFromLocal() {
            const saved = localStorage.getItem('blue_dog');
            if(saved) {
                try {
                    const data = JSON.parse(saved);
                    this.commands = data.commands || {};
                    this.updateCommandsDisplay();
                    this.addMessage(`🐶 Загружено ${Object.keys(this.commands).length} команд из памяти!`, "system");
                } catch(e) {}
            }
        }
        
        exportToFile() {
            const data = { commands: this.commands, version: 1, exportDate: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `blue_${new Date().toISOString().slice(0,19)}.blmu`;
            a.click();
            URL.revokeObjectURL(url);
            this.addMessage(`💾 Блю сохранён в файл!`, "system");
        }
        
        importFromFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    this.commands = data.commands || {};
                    this.updateCommandsDisplay();
                    this.addMessage(`📂 Загружено ${Object.keys(this.commands).length} команд из файла!`, "system");
                    this.saveToLocal();
                } catch(err) {
                    this.addMessage(`❌ Ошибка загрузки: ${err.message}`, "system");
                }
            };
            reader.readAsText(file);
        }
        
        async processInput(text) {
            if(this.isLearning) {
                if(text.toLowerCase() === 'отмена') {
                    this.cancelLearning();
                    this.addMessage("🐶 Обучение отменено.", "blue");
                    return;
                }
                this.addMessage("❌ Сначала закончи обучение команде! Напиши 'отмена'", "system");
                return;
            }
            
            if(this.waitingForQuestion) {
                this.addMessage(text, "user");
                this.answerQuestion(text);
                return;
            }
            
            if(text.toLowerCase() === 'запомни') {
                this.startLearning();
                return;
            }
            
            this.addMessage(text, "user");
            const executed = this.executeCommand(text, text);
            if(!executed) {
                this.addMessage(`🐶 Гав? Я не знаю команду "${text}". Научи меня! Напиши "Запомни"`, "blue");
            }
        }
        
        addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender === 'user' ? 'user-message' : (sender === 'blue' ? 'blue-message' : 'system-message')}`;
            msgDiv.innerHTML = text;
            this.messagesDiv.appendChild(msgDiv);
            msgDiv.scrollIntoView({ behavior: 'smooth' });
        }
    }
    
    const blue = new BlueDog();
    window.blue = blue;
    window.updateAnswerActionConfig = (idx) => blue.updateAnswerActionConfig(idx);
    window.updateWrongActionValue = () => blue.updateWrongActionValue();
    window.removeAnswerField = (idx) => blue.removeAnswerField(idx);
    window.removeMultiActionField = (idx) => blue.removeMultiActionField(idx);
    window.addMultiActionField = () => blue.addMultiActionField();
    window.updateMultiActionConfig = (idx) => blue.updateMultiActionConfig(idx);
    window.addMultiQuestionAnswer = (idx) => blue.addMultiQuestionAnswer(idx);
    window.removeMultiQuestionAnswer = (midx, aidx) => blue.removeMultiQuestionAnswer(midx, aidx);
    
    function send() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;
        blue.processInput(text);
        input.value = '';
    }
    
    document.getElementById('sendBtn').onclick = send;
    document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') send(); };
    document.getElementById('startMicBtn').onclick = () => blue.startMicrophone();
    document.getElementById('stopMicBtn').onclick = () => blue.stopMicrophone();
    document.getElementById('exportBtn').onclick = () => blue.exportToFile();
    document.getElementById('importFile').onchange = (e) => {
        if(e.target.files[0]) blue.importFromFile(e.target.files[0]);
        e.target.value = '';
    };
    
    window.addEventListener('resize', () => {
        blue.setupCanvas();
        blue.drawRoom();
    });
</script>
