<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Редактор Блю — создай своего ИИ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1a, #0c1222);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 20px; }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #6ee7ff, #3b82f6, #1e3a8a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .sub { color: #8a9bbb; font-size: 0.8rem; }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab {
            background: #1e293b;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            color: #cbd5e6;
        }
        .tab.active {
            background: linear-gradient(135deg, #3b82f6, #1e3a8a);
            color: white;
        }
        
        .editor-panel {
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            padding: 20px;
            backdrop-filter: blur(8px);
            border: 1px solid #3b82f6;
            margin-bottom: 20px;
        }
        
        .info-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            align-items: center;
        }
        .info-row label {
            color: #bbd7ff;
            min-width: 80px;
        }
        .info-row input, .info-row select {
            background: #0e1625;
            border: 2px solid #3b82f6;
            padding: 10px 15px;
            border-radius: 20px;
            color: white;
            font-size: 1rem;
        }
        .icon-preview {
            font-size: 48px;
            background: #1e293b;
            border-radius: 20px;
            padding: 5px 15px;
        }
        
        .commands-section, .drawings-section {
            margin-top: 20px;
        }
        .section-title {
            color: #bbd7ff;
            margin-bottom: 15px;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .command-list, .drawing-list {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
        }
        .command-item, .drawing-item {
            background: #1e293b;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .command-trigger, .drawing-trigger {
            flex: 1;
            background: #0e1625;
            border: 1px solid #3b82f6;
            padding: 8px 12px;
            border-radius: 20px;
            color: white;
        }
        .command-response, .drawing-type {
            flex: 2;
            background: #0e1625;
            border: 1px solid #3b82f6;
            padding: 8px 12px;
            border-radius: 20px;
            color: white;
        }
        .drawing-value {
            flex: 2;
            background: #0e1625;
            border: 1px solid #3b82f6;
            padding: 8px 12px;
            border-radius: 20px;
            color: white;
        }
        .delete-btn {
            background: #dc2626;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }
        .add-btn {
            background: #10b981;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .action-btn {
            background: linear-gradient(135deg, #3b82f6, #1e3a8a);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .template-btn {
            background: #f59e0b;
        }
        
        .chat-preview {
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            padding: 20px;
            margin-top: 20px;
        }
        .messages {
            height: 200px;
            overflow-y: auto;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            word-wrap: break-word;
        }
        .user-msg {
            align-self: flex-end;
            background: #3b82f6;
            color: white;
        }
        .bot-msg {
            align-self: flex-start;
            background: #1e293b;
            color: white;
            border-left: 3px solid #3b82f6;
        }
        .preview-input {
            display: flex;
            gap: 10px;
        }
        .preview-input input {
            flex: 1;
            background: #0e1625;
            border: 2px solid #3b82f6;
            padding: 10px 15px;
            border-radius: 30px;
            color: white;
        }
        
        .room-preview {
            background: #1a2a3a;
            border-radius: 20px;
            min-height: 200px;
            margin-top: 15px;
            position: relative;
            overflow: hidden;
        }
        .drawing-canvas {
            width: 100%;
            height: 200px;
            background: #1a2a3a;
            border-radius: 20px;
        }
        
        @media (max-width: 800px) {
            .command-item, .drawing-item { flex-direction: column; }
            .tab { padding: 6px 16px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎨 РЕДАКТОР БЛЮ</h1>
        <div class="sub">создай своего ИИ · команды · рисунки · сохранение в .bm</div>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="editor">📝 Редактор</div>
        <div class="tab" data-tab="chat">💬 Чат с Блю</div>
        <div class="tab" data-tab="room">🏠 Комната</div>
    </div>

    <!-- Вкладка редактора -->
    <div id="editor-tab" class="tab-content active">
        <div class="editor-panel">
            <div class="info-row">
                <label>🤖 Имя:</label>
                <input type="text" id="botName" value="Блю" style="flex:1">
                <label>🎨 Иконка:</label>
                <select id="botIcon">
                    <option value="🐕">🐕 Собака</option>
                    <option value="🐱">🐱 Кот</option>
                    <option value="🍄">🍄 Гриб</option>
                    <option value="🤖">🤖 Робот</option>
                    <option value="👻">👻 Призрак</option>
                    <option value="⭐">⭐ Звезда</option>
                    <option value="❤️">❤️ Сердце</option>
                    <option value="😎">😎 Крутой</option>
                </select>
                <div class="icon-preview" id="iconPreview">🐕</div>
            </div>

            <div class="commands-section">
                <div class="section-title">
                    📝 КОМАНДЫ (слово → ответ)
                    <button class="add-btn" id="addCommandBtn" style="padding:5px 15px;">+ Добавить</button>
                </div>
                <div id="commandsList" class="command-list"></div>
            </div>

            <div class="drawings-section">
                <div class="section-title">
                    🎨 РИСУНКИ (слово → что рисовать)
                    <button class="add-btn" id="addDrawingBtn" style="padding:5px 15px;">+ Добавить</button>
                </div>
                <div id="drawingsList" class="drawing-list"></div>
            </div>

            <div class="action-buttons">
                <button class="action-btn" id="saveBtn">💾 Сохранить в .bm</button>
                <button class="action-btn template-btn" id="loadTemplatesBtn">📦 Встроенные шаблоны</button>
                <button class="action-btn" id="loadFileBtn" style="background:#6b7280;">📂 Загрузить .bm</button>
                <input type="file" id="fileInput" style="display:none" accept=".bm">
            </div>
        </div>
    </div>

    <!-- Вкладка чата -->
    <div id="chat-tab" class="tab-content">
        <div class="editor-panel">
            <div class="info-row">
                <div class="icon-preview" id="chatIconPreview">🐕</div>
                <span style="color:white; font-size:1.5rem;" id="chatNamePreview">Блю</span>
            </div>
            <div class="messages" id="chatMessages">
                <div class="message bot-msg">🐕 Привет! Я Блю. Спрашивай меня о чём угодно!</div>
            </div>
            <div class="preview-input">
                <input type="text" id="chatInput" placeholder="Спроси Блю..." onkeypress="if(event.key==='Enter') sendChatMessage()">
                <button id="sendChatBtn" style="background:#3b82f6; border:none; padding:10px 20px; border-radius:30px; color:white;">Отправить</button>
            </div>
        </div>
    </div>

    <!-- Вкладка комнаты -->
    <div id="room-tab" class="tab-content">
        <div class="editor-panel">
            <div class="room-preview">
                <canvas id="roomCanvas" width="600" height="300" style="width:100%; height:auto; background:#1a2a3a; border-radius:20px;"></canvas>
            </div>
            <div class="room-items" id="roomItemsList" style="margin-top:15px; display:flex; flex-wrap:wrap; gap:8px;"></div>
            <button id="clearRoomBtn" style="background:#dc2626; border:none; padding:8px 20px; border-radius:30px; color:white; margin-top:15px;">Очистить комнату</button>
        </div>
    </div>
</div>

<script>
    // Состояние Блю
    let blueConfig = {
        name: "Блю",
        icon: "🐕",
        commands: [
            { trigger: "привет", response: "Привет! Рад тебя видеть!" },
            { trigger: "как дела", response: "У меня всё отлично! А у тебя?" },
            { trigger: "кто ты", response: "Я Блю — твой персональный ИИ!" },
            { trigger: "спасибо", response: "Пожалуйста! Мне приятно 💙" },
            { trigger: "пока", response: "Пока! Заходи ещё!" },
            { trigger: "ты", response: "я?" }
        ],
        drawings: [
            { trigger: "круг", type: "shape", value: "circle" },
            { trigger: "квадрат", type: "shape", value: "square" },
            { trigger: "какашка", type: "shape", value: "poop" },
            { trigger: "сердце", type: "shape", value: "heart" }
        ]
    };
    
    let roomItems = [];
    let canvas = null;
    let ctx = null;
    
    // Инициализация
    function init() {
        setupTabs();
        setupEventListeners();
        renderCommands();
        renderDrawings();
        updatePreview();
        initCanvas();
    }
    
    function setupTabs() {
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const tabName = tab.dataset.tab;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`${tabName}-tab`).classList.add('active');
                if (tabName === 'room') drawRoom();
            });
        });
    }
    
    function setupEventListeners() {
        document.getElementById('botName').addEventListener('input', updatePreview);
        document.getElementById('botIcon').addEventListener('change', updatePreview);
        document.getElementById('addCommandBtn').addEventListener('click', () => addCommand());
        document.getElementById('addDrawingBtn').addEventListener('click', () => addDrawing());
        document.getElementById('saveBtn').addEventListener('click', saveToFile);
        document.getElementById('loadTemplatesBtn').addEventListener('click', loadTemplates);
        document.getElementById('loadFileBtn').addEventListener('click', () => document.getElementById('fileInput').click());
        document.getElementById('fileInput').addEventListener('change', loadFromFile);
        document.getElementById('sendChatBtn').addEventListener('click', sendChatMessage);
        document.getElementById('clearRoomBtn').addEventListener('click', clearRoom);
        document.getElementById('chatInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendChatMessage(); });
    }
    
    function updatePreview() {
        const name = document.getElementById('botName').value || "Блю";
        const icon = document.getElementById('botIcon').value;
        document.getElementById('iconPreview').innerText = icon;
        document.getElementById('chatIconPreview').innerText = icon;
        document.getElementById('chatNamePreview').innerText = name;
        blueConfig.name = name;
        blueConfig.icon = icon;
    }
    
    function renderCommands() {
        const container = document.getElementById('commandsList');
        container.innerHTML = '';
        blueConfig.commands.forEach((cmd, idx) => {
            const div = document.createElement('div');
            div.className = 'command-item';
            div.innerHTML = `
                <input type="text" class="command-trigger" value="${escapeHtml(cmd.trigger)}" placeholder="Команда (например: привет)">
                <input type="text" class="command-response" value="${escapeHtml(cmd.response)}" placeholder="Ответ (например: Привет!)">
                <button class="delete-btn" data-idx="${idx}" data-type="command">🗑️</button>
            `;
            container.appendChild(div);
        });
        
        // Привязываем события
        document.querySelectorAll('#commandsList .command-trigger').forEach((input, idx) => {
            input.addEventListener('change', (e) => blueConfig.commands[idx].trigger = normalizeText(e.target.value));
        });
        document.querySelectorAll('#commandsList .command-response').forEach((input, idx) => {
            input.addEventListener('change', (e) => blueConfig.commands[idx].response = e.target.value);
        });
        document.querySelectorAll('#commandsList .delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.idx);
                blueConfig.commands.splice(idx, 1);
                renderCommands();
            });
        });
    }
    
    function renderDrawings() {
        const container = document.getElementById('drawingsList');
        container.innerHTML = '';
        blueConfig.drawings.forEach((draw, idx) => {
            const div = document.createElement('div');
            div.className = 'drawing-item';
            div.innerHTML = `
                <input type="text" class="drawing-trigger" value="${escapeHtml(draw.trigger)}" placeholder="Слово (например: круг)">
                <select class="drawing-type">
                    <option value="shape" ${draw.type === 'shape' ? 'selected' : ''}>Фигура</option>
                    <option value="emoji" ${draw.type === 'emoji' ? 'selected' : ''}>Эмодзи</option>
                </select>
                <input type="text" class="drawing-value" value="${escapeHtml(draw.value)}" placeholder="круг/квадрат/сердце/💩">
                <button class="delete-btn" data-idx="${idx}" data-type="drawing">🗑️</button>
            `;
            container.appendChild(div);
        });
        
        document.querySelectorAll('#drawingsList .drawing-trigger').forEach((input, idx) => {
            input.addEventListener('change', (e) => blueConfig.drawings[idx].trigger = normalizeText(e.target.value));
        });
        document.querySelectorAll('#drawingsList .drawing-type').forEach((select, idx) => {
            select.addEventListener('change', (e) => blueConfig.drawings[idx].type = e.target.value);
        });
        document.querySelectorAll('#drawingsList .drawing-value').forEach((input, idx) => {
            input.addEventListener('change', (e) => blueConfig.drawings[idx].value = e.target.value);
        });
        document.querySelectorAll('#drawingsList .delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.idx);
                blueConfig.drawings.splice(idx, 1);
                renderDrawings();
            });
        });
    }
    
    function addCommand() {
        blueConfig.commands.push({ trigger: "новая_команда", response: "новый ответ" });
        renderCommands();
    }
    
    function addDrawing() {
        blueConfig.drawings.push({ trigger: "новый_рисунок", type: "shape", value: "circle" });
        renderDrawings();
    }
    
    function normalizeText(text) {
        return text.toLowerCase().replace(/[!?.,;:()\-–—\s]/g, '').trim();
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    
    function saveToFile() {
        const data = JSON.stringify(blueConfig, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${blueConfig.name}.bm`;
        a.click();
        URL.revokeObjectURL(url);
        addChatMessage("💾 Блю сохранён в файл!", "bot");
    }
    
    function loadFromFile(event) {
        const file = event.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const config = JSON.parse(e.target.result);
                blueConfig = config;
                document.getElementById('botName').value = blueConfig.name;
                document.getElementById('botIcon').value = blueConfig.icon;
                renderCommands();
                renderDrawings();
                updatePreview();
                addChatMessage(`📂 Загружен Блю "${blueConfig.name}"`, "bot");
            } catch(err) {
                addChatMessage("❌ Ошибка загрузки файла", "bot");
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    }
    
    function loadTemplates() {
        const templates = {
            собака: {
                name: "Собака",
                icon: "🐕",
                commands: [
                    { trigger: "привет", response: "Гав! Привет!" },
                    { trigger: "как дела", response: "Гав-гав! Отлично!" },
                    { trigger: "гулять", response: "Ура! Пойдём гулять! 🐕" },
                    { trigger: "есть", response: "Ням-ням! Спасибо!" },
                    { trigger: "сидеть", response: "🐕 сел" },
                    { trigger: "лежать", response: "🐕 лёг" },
                    { trigger: "голос", response: "ГАВ! 🗣️" }
                ],
                drawings: [
                    { trigger: "косточка", type: "emoji", value: "🦴" },
                    { trigger: "мяч", type: "emoji", value: "⚽" },
                    { trigger: "будка", type: "shape", value: "square" }
                ]
            },
            кот: {
                name: "Кот",
                icon: "🐱",
                commands: [
                    { trigger: "привет", response: "Мяу! Привет!" },
                    { trigger: "как дела", response: "Мурр... Хорошо" },
                    { trigger: "есть", response: "Мяу! Дай рыбы!" },
                    { trigger: "спать", response: "Мурр... Ззз" },
                    { trigger: "играть", response: "🐱 бегает за лазером" }
                ],
                drawings: [
                    { trigger: "рыба", type: "emoji", value: "🐟" },
                    { trigger: "клубок", type: "shape", value: "circle" },
                    { trigger: "мышь", type: "emoji", value: "🐭" }
                ]
            },
            гриб: {
                name: "Гриб",
                icon: "🍄",
                commands: [
                    { trigger: "привет", response: "🍄 Привет-привет!" },
                    { trigger: "как дела", response: "🍄 Расту потихоньку" },
                    { trigger: "дождь", response: "🍄 Ура! Водичка!" }
                ],
                drawings: [
                    { trigger: "гриб", type: "emoji", value: "🍄" },
                    { trigger: "мухомор", type: "shape", value: "circle" }
                ]
            },
            робот: {
                name: "Робот",
                icon: "🤖",
                commands: [
                    { trigger: "привет", response: "🤖 Здравствуй, человек" },
                    { trigger: "как дела", response: "🤖 ВСЕ СИСТЕМЫ РАБОТАЮТ" },
                    { trigger: "помощь", response: "🤖 АНАЛИЗИРУЮ ЗАПРОС..." }
                ],
                drawings: [
                    { trigger: "шестерёнка", type: "emoji", value: "⚙️" },
                    { trigger: "микросхема", type: "shape", value: "square" }
                ]
            }
        };
        
        const templateNames = Object.keys(templates);
        const selected = prompt(`Выбери шаблон: ${templateNames.join(', ')}`, "собака");
        if(selected && templates[selected]) {
            const tpl = templates[selected];
            blueConfig.name = tpl.name;
            blueConfig.icon = tpl.icon;
            blueConfig.commands = tpl.commands;
            blueConfig.drawings = tpl.drawings;
            document.getElementById('botName').value = blueConfig.name;
            document.getElementById('botIcon').value = blueConfig.icon;
            renderCommands();
            renderDrawings();
            updatePreview();
            addChatMessage(`📦 Загружен шаблон "${blueConfig.name}"`, "bot");
        }
    }
    
    // === ЧАТ ===
    function sendChatMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if(!text) return;
        addChatMessage(text, "user");
        input.value = '';
        
        const response = getBotResponse(text);
        setTimeout(() => addChatMessage(response, "bot"), 300);
        
        // Проверяем, нужно ли рисовать
        checkAndDraw(text);
    }
    
    function getBotResponse(message) {
        const normalized = normalizeText(message);
        
        // Проверяем команды
        for(const cmd of blueConfig.commands) {
            const cmdNorm = normalizeText(cmd.trigger);
            if(normalized.includes(cmdNorm) || cmdNorm.includes(normalized)) {
                return `${blueConfig.icon} ${cmd.response}`;
            }
        }
        
        // Рисование
        for(const draw of blueConfig.drawings) {
            const drawNorm = normalizeText(draw.trigger);
            if(normalized.includes(drawNorm) || drawNorm.includes(normalized)) {
                return `${blueConfig.icon} Рисую ${draw.trigger}!`;
            }
        }
        
        // Ответ по умолчанию
        const defaultResponses = [
            `${blueConfig.icon} Интересно... Расскажи ещё!`,
            `${blueConfig.icon} Я тебя внимательно слушаю.`,
            `${blueConfig.icon} Правда? Давай обсудим!`,
            `${blueConfig.icon} Хороший вопрос!`
        ];
        return defaultResponses[Math.floor(Math.random() * defaultResponses.length)];
    }
    
    function addChatMessage(text, sender) {
        const container = document.getElementById('chatMessages');
        const msg = document.createElement('div');
        msg.className = `message ${sender === 'user' ? 'user-msg' : 'bot-msg'}`;
        msg.innerHTML = text;
        container.appendChild(msg);
        msg.scrollIntoView({ behavior: 'smooth' });
    }
    
    // === КОМНАТА И РИСОВАНИЕ ===
    function initCanvas() {
        canvas = document.getElementById('roomCanvas');
        if(!canvas) return;
        const container = canvas.parentElement;
        const width = Math.min(600, container.clientWidth - 20);
        canvas.width = width;
        canvas.height = width * 0.5;
        ctx = canvas.getContext('2d');
        drawRoom();
    }
    
    function checkAndDraw(message) {
        const normalized = normalizeText(message);
        for(const draw of blueConfig.drawings) {
            const drawNorm = normalizeText(draw.trigger);
            if(normalized.includes(drawNorm) || drawNorm.includes(normalized)) {
                drawOnCanvas(draw);
                break;
            }
        }
    }
    
    function drawOnCanvas(drawing) {
        if(!ctx) initCanvas();
        const x = canvas.width / 2;
        const y = canvas.height / 2;
        
        if(drawing.type === 'emoji') {
            ctx.fillStyle = "white";
            ctx.font = "40px monospace";
            ctx.fillText(drawing.value, x - 20, y + 15);
        } else {
            switch(drawing.value) {
                case 'circle':
                    ctx.beginPath();
                    ctx.arc(x, y, 40, 0, Math.PI * 2);
                    ctx.fillStyle = '#fbbf24';
                    ctx.fill();
                    break;
                case 'square':
                    ctx.fillStyle = '#3b82f6';
                    ctx.fillRect(x - 40, y - 40, 80, 80);
                    break;
                case 'poop':
                    ctx.fillStyle = '#8B4513';
                    ctx.beginPath();
                    ctx.ellipse(x, y, 30, 25, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = 'white';
                    ctx.font = "30px monospace";
                    ctx.fillText('💩', x - 15, y + 12);
                    break;
                case 'heart':
                    ctx.fillStyle = '#ef4444';
                    ctx.beginPath();
                    ctx.moveTo(x, y - 20);
                    ctx.bezierCurveTo(x - 30, y - 50, x - 50, y - 10, x, y + 20);
                    ctx.bezierCurveTo(x + 50, y - 10, x + 30, y - 50, x, y - 20);
                    ctx.fill();
                    break;
                default:
                    ctx.fillStyle = `hsl(${Math.random() * 360}, 70%, 60%)`;
                    ctx.fillRect(x - 30, y - 30, 60, 60);
                    ctx.fillStyle = 'white';
                    ctx.font = "12px monospace";
                    ctx.fillText(drawing.value, x - 20, y);
            }
        }
        
        setTimeout(() => drawRoom(), 3000);
    }
    
    function drawRoom() {
        if(!ctx) return;
        ctx.fillStyle = "#1a2a3a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#2a3a2a";
        ctx.fillRect(0, canvas.height - 40, canvas.width, 40);
        
        for(const item of roomItems) {
            ctx.fillStyle = item.color;
            ctx.fillRect(item.x, item.y, 40, 40);
            ctx.fillStyle = "white";
            ctx.font = "24px monospace";
            ctx.fillText(item.emoji, item.x + 8, item.y + 30);
        }
        
        const container = document.getElementById('roomItemsList');
        container.innerHTML = '';
        for(const item of roomItems) {
            const badge = document.createElement('span');
            badge.className = 'room-item';
            badge.innerHTML = `${item.emoji} ${item.name}`;
            container.appendChild(badge);
        }
    }
    
    function clearRoom() {
        roomItems = [];
        drawRoom();
        addChatMessage("🧹 Комната очищена!", "bot");
    }
    
    window.addEventListener('resize', () => {
        if(canvas) initCanvas();
    });
    
    init();
</script>
</body>
</html>
