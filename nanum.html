<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanu Music — генератор песен с текстом</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1a, #0c1222);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1500px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 25px; }
        h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .sub { color: #8a9bbb; }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            background: #1f2a44;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab.active {
            background: linear-gradient(135deg, #f5576c, #f093fb);
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .control-panel {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #2a3a60;
        }
        .flex-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        input, select, textarea {
            background: #0e1625;
            border: 2px solid #2a3a60;
            padding: 12px 20px;
            border-radius: 60px;
            color: white;
            font-size: 0.95rem;
        }
        input { flex: 2; }
        select { flex: 1; }
        textarea {
            width: 100%;
            border-radius: 20px;
            resize: vertical;
            font-family: monospace;
        }
        button {
            background: linear-gradient(135deg, #1f3a6b, #0f1a2e);
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button.primary { background: linear-gradient(135deg, #f5576c, #f093fb); }
        button.success { background: linear-gradient(135deg, #10b981, #059669); }
        button.warning { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }
        .stat-card {
            background: #0f1625aa;
            border-radius: 20px;
            padding: 10px;
            text-align: center;
        }
        .stat-number { font-size: 1.5rem; font-weight: bold; color: #f093fb; }
        .progress {
            height: 20px;
            background: #1e293b;
            border-radius: 30px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            transition: width 0.2s;
        }
        .music-area {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .generator-panel {
            flex: 1;
            background: #050b16aa;
            border-radius: 24px;
            padding: 15px;
        }
        .player-panel {
            flex: 1;
            background: #050b16aa;
            border-radius: 24px;
            padding: 15px;
        }
        .title { font-size: 0.85rem; margin-bottom: 10px; color: #bbd7ff; }
        .visualizer {
            background: #00000055;
            border-radius: 16px;
            height: 100px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
        }
        .bar {
            width: 6px;
            background: linear-gradient(180deg, #f093fb, #f5576c);
            border-radius: 3px;
            transition: height 0.05s;
        }
        .notation {
            background: #0f1a2e;
            border-radius: 12px;
            padding: 10px;
            margin-top: 10px;
            font-family: monospace;
            font-size: 0.7rem;
            max-height: 150px;
            overflow-y: auto;
        }
        .lyrics {
            background: #0f1a2e;
            border-radius: 12px;
            padding: 10px;
            margin-top: 10px;
            font-family: monospace;
            font-size: 0.75rem;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        audio { width: 100%; margin-top: 15px; }
        .log {
            background: #020617aa;
            border-radius: 16px;
            padding: 12px;
            height: 100px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.7rem;
        }
        .log-line { color: #86efac; border-left: 2px solid #f5576c; padding-left: 8px; margin: 4px 0; }
        .param-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .param-row label {
            color: #aaa;
            font-size: 0.8rem;
        }
        @media (max-width: 800px) {
            .music-area { flex-direction: column; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎵 NANU MUSIC</h1>
        <div class="sub">генератор песен · музыка + текст · обучение из интернета</div>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="ai">🤖 ИИ-СТИЛИ (из интернета)</div>
        <div class="tab" data-tab="custom">✍️ СОЗДАТЬ СВОЙ СТИЛЬ</div>
    </div>

    <!-- Вкладка AI -->
    <div class="tab-content active" id="ai-tab">
        <div class="control-panel">
            <div class="flex-row">
                <input type="text" id="aiStyle" placeholder="Стиль музыки (например: punk rock, jazz, metal, electronic)" value="punk rock">
                <button id="searchStyleBtn" class="primary">🌐 НАЙТИ СТИЛЬ В ИНТЕРНЕТЕ</button>
                <button id="generateFromAiBtn" class="success">🎵 СГЕНЕРИРОВАТЬ ПЕСНЮ</button>
            </div>
            <div class="flex-row">
                <input type="text" id="songTopic" placeholder="Тема песни (например: любовь, свобода, космос)" value="бунт и свобода">
            </div>
            <div class="stats">
                <div class="stat-card"><div>🎸 ВЫУЧЕНО СТИЛЕЙ</div><div class="stat-number" id="stylesCount">0</div></div>
                <div class="stat-card"><div>🎵 ПАТТЕРНОВ</div><div class="stat-number" id="patternsCount">0</div></div>
            </div>
            <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
        </div>
    </div>

    <!-- Вкладка создания своего стиля -->
    <div class="tab-content" id="custom-tab">
        <div class="control-panel">
            <div class="param-row">
                <label>Название стиля:</label>
                <input type="text" id="customStyleName" placeholder="Мой стиль" style="flex:1">
            </div>
            <div class="param-row">
                <label>Темп (BPM):</label>
                <input type="range" id="tempo" min="60" max="200" value="140">
                <span id="tempoValue">140</span>
            </div>
            <div class="param-row">
                <label>Тональность:</label>
                <select id="key">
                    <option>Cm</option><option>Dm</option><option>Em</option><option>Fm</option>
                    <option>Gm</option><option>Am</option><option>Bm</option>
                    <option>C</option><option>D</option><option>E</option><option>F</option><option>G</option><option>A</option><option>B</option>
                </select>
                <label>Аккорды:</label>
                <input type="text" id="chords" placeholder="C5 G5 A5 F5" value="C5 G5 A5 F5">
            </div>
            <div class="param-row">
                <label>Инструменты:</label>
                <input type="text" id="instruments" placeholder="гитара, барабаны, бас" value="гитара, барабаны, бас">
            </div>
            <div class="flex-row">
                <button id="saveStyleBtn" class="primary">💾 СОХРАНИТЬ СТИЛЬ</button>
                <button id="generateFromCustomBtn" class="success">🎵 СГЕНЕРИРОВАТЬ ПЕСНЮ</button>
            </div>
            <div class="flex-row">
                <input type="text" id="customSongTopic" placeholder="Тема песни" value="моя жизнь">
            </div>
        </div>
    </div>

    <div class="music-area">
        <div class="generator-panel">
            <div class="title">🎹 МЕЛОДИЯ</div>
            <div class="visualizer" id="visualizer"></div>
            <div class="notation" id="notation"></div>
            <div class="title" style="margin-top:15px">📝 ТЕКСТ ПЕСНИ</div>
            <div class="lyrics" id="lyrics"></div>
        </div>
        <div class="player-panel">
            <div class="title">🔊 ПЛЕЕР</div>
            <audio id="audioPlayer" controls></audio>
            <div style="margin-top: 15px; font-size: 0.7rem; color: #aaa;">
                🎸 Генерация на основе выученных стилей<br>
                📝 Текст сочиняется нейросетью на заданную тему
            </div>
        </div>
    </div>

    <div class="log" id="logPanel"></div>
</div>

<script>
    (function(){
        class NanuMusic {
            constructor() {
                this.styles = new Map();
                
                this.stylesCountSpan = document.getElementById('stylesCount');
                this.patternsCountSpan = document.getElementById('patternsCount');
                this.progressFill = document.getElementById('progressFill');
                this.notationDiv = document.getElementById('notation');
                this.lyricsDiv = document.getElementById('lyrics');
                this.visualizer = document.getElementById('visualizer');
                this.audioPlayer = document.getElementById('audioPlayer');
                this.logDiv = document.getElementById('logPanel');
                
                // Ноты для генерации
                this.notes = {
                    'C': 261.63, 'C#': 277.18, 'D': 293.66, 'D#': 311.13, 'E': 329.63, 'F': 349.23,
                    'F#': 369.99, 'G': 392.00, 'G#': 415.30, 'A': 440.00, 'A#': 466.16, 'B': 493.88
                };
                
                this.initVisualizer();
                this.addLog("🎵 NANU MUSIC готова. Ищи стили в интернете или создавай свои!");
                this.loadDefaultStyles();
            }
            
            loadDefaultStyles() {
                // Базовые стили для примера
                this.styles.set('punk rock', {
                    name: 'punk rock',
                    tempo: 160,
                    chords: ['C5', 'G5', 'A5', 'F5'],
                    pattern: [0, 1, 2, 1, 0, 2, 1, 0],
                    instruments: 'гитара, барабаны, бас'
                });
                this.styles.set('jazz', {
                    name: 'jazz',
                    tempo: 120,
                    chords: ['Cmaj7', 'Dm7', 'G7', 'Cmaj7'],
                    pattern: [0, 1, 2, 1, 0, 2, 3, 0],
                    instruments: 'пианино, контрабас, ударные'
                });
                this.updateStats();
            }
            
            async searchStyleInInternet(styleName) {
                this.addLog(`🔍 Ищу стиль "${styleName}" в интернете...`);
                this.progressFill.style.width = "20%";
                
                try {
                    const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(styleName + ' music genre характеристики')}&format=json&no_html=1`;
                    const response = await fetch(url);
                    const data = await response.json();
                    
                    // Анализируем описание и создаём стиль
                    const description = data.AbstractText || data.Definition || "";
                    
                    // Определяем характеристики на основе описания
                    let tempo = 120;
                    let chords = ['C', 'G', 'Am', 'F'];
                    
                    if(description.toLowerCase().includes('fast') || description.toLowerCase().includes('быстр')) tempo = 170;
                    if(description.toLowerCase().includes('slow') || description.toLowerCase().includes('медлен')) tempo = 80;
                    if(styleName.toLowerCase().includes('punk')) { tempo = 170; chords = ['C5', 'G5', 'A5', 'F5']; }
                    if(styleName.toLowerCase().includes('rock')) { tempo = 140; chords = ['E5', 'G5', 'A5', 'D5']; }
                    if(styleName.toLowerCase().includes('jazz')) { tempo = 110; chords = ['Cmaj7', 'Dm7', 'G7']; }
                    if(styleName.toLowerCase().includes('metal')) { tempo = 180; chords = ['E5', 'F5', 'G5', 'A5']; }
                    if(styleName.toLowerCase().includes('electronic')) { tempo = 128; chords = ['C', 'G', 'Am', 'F']; }
                    
                    const style = {
                        name: styleName,
                        tempo: tempo,
                        chords: chords,
                        pattern: [0, 1, 2, 1, 0, 2, 1, 0, 0, 1, 2, 3, 3, 2, 1, 0],
                        instruments: 'из интернета',
                        description: description.slice(0, 200)
                    };
                    
                    this.styles.set(styleName.toLowerCase(), style);
                    this.updateStats();
                    this.progressFill.style.width = "100%";
                    setTimeout(() => this.progressFill.style.width = "0%", 500);
                    
                    this.addLog(`✅ Найден и сохранён стиль "${styleName}" (темп: ${tempo} BPM)`, "#0f0");
                    return style;
                    
                } catch(e) {
                    this.addLog(`⚠️ Ошибка поиска: ${e.message}. Создаю базовый стиль.`, "#ffaa66");
                    const style = {
                        name: styleName,
                        tempo: 120,
                        chords: ['C', 'G', 'Am', 'F'],
                        pattern: [0, 1, 2, 1, 0, 2, 1, 0],
                        instruments: 'стандартные'
                    };
                    this.styles.set(styleName.toLowerCase(), style);
                    this.updateStats();
                    return style;
                }
            }
            
            saveCustomStyle() {
                const name = document.getElementById('customStyleName').value.trim();
                if(!name) { this.addLog("❌ Введите название стиля", "#ff8888"); return null; }
                
                const tempo = parseInt(document.getElementById('tempo').value);
                const key = document.getElementById('key').value;
                const chordsStr = document.getElementById('chords').value;
                const instruments = document.getElementById('instruments').value;
                
                const chords = chordsStr.split(/\s+/).filter(c => c.length > 0);
                
                const style = {
                    name: name,
                    tempo: tempo,
                    key: key,
                    chords: chords,
                    pattern: [0, 1, 2, 1, 0, 2, 1, 0, 0, 1, 2, 3, 3, 2, 1, 0],
                    instruments: instruments
                };
                
                this.styles.set(name.toLowerCase(), style);
                this.updateStats();
                this.addLog(`✅ Сохранён стиль "${name}" (темп: ${tempo} BPM, аккорды: ${chords.join(', ')})`, "#0f0");
                return style;
            }
            
            generateLyrics(topic, style) {
                this.addLog(`📝 Сочиняю текст на тему "${topic}" в стиле ${style.name}...`);
                
                const lyricsTemplates = {
                    'бунт': [
                        "Я не хочу молчать!\nМоё сердце бьётся в такт!\nСвобода — это мой выбор!\nНикто не скажет мне — назад!",
                        "Разбитые стёкла, рваные джинсы,\nГромкая музыка, рваные рифмы.\nМы против системы, мы против оков,\nНаша правда громче всех слов!"
                    ],
                    'любовь': [
                        "Твои глаза как звёзды в ночи,\nЯ слышу сердце, ты не молчи.\nМежду нами только шаг,\nНо я боюсь сделать его.",
                        "Любовь — это не боль,\nЭто когда ты мой герой.\nМы вместе против всех,\nС тобой я знаю успех!"
                    ],
                    'свобода': [
                        "Свобода — это ветер в лицо,\nСвобода — когда бьётся сердце в такт!\nНикто не посадит меня в клетку,\nЯ рождён летать!",
                        "Разорви оковы, встань с колен!\nСегодня ты сам себе король и тень.\nНе слушай тех, кто говорит «нельзя»,\nТвоя жизнь — твоя земля!"
                    ],
                    'космос': [
                        "Звёзды зовут меня в полёт,\nГравитации больше нет.\nЯ лечу сквозь миллионы лет,\nЧтобы найти свой свет.",
                        "В бесконечной тишине\nЯ ищу ответы при луне.\nКосмос шепчет мне: «Лети»,\nТам, где нет пути."
                    ]
                };
                
                // Поиск подходящей темы
                let lyrics = "";
                for(const [key, templates] of Object.entries(lyricsTemplates)) {
                    if(topic.toLowerCase().includes(key)) {
                        lyrics = templates[Math.floor(Math.random() * templates.length)];
                        break;
                    }
                }
                
                if(!lyrics) {
                    lyrics = `В ритме ${style.name} я иду вперёд,\n${topic} — вот мой поворот.\nМузыка в сердце, драйв в крови,\nЭто момент настоящей любви!`;
                }
                
                this.lyricsDiv.innerHTML = lyrics;
                return lyrics;
            }
            
            generateMusic(style, duration = 8) {
                this.addLog(`🎸 Генерирую музыку в стиле "${style.name}" (темп: ${style.tempo} BPM)...`);
                
                const notesList = [];
                const chordNotes = {
                    'C': ['C', 'E', 'G'], 'G': ['G', 'B', 'D'], 'Am': ['A', 'C', 'E'], 'F': ['F', 'A', 'C'],
                    'C5': ['C', 'G'], 'G5': ['G', 'D'], 'A5': ['A', 'E'], 'F5': ['F', 'C'],
                    'D': ['D', 'F#', 'A'], 'E': ['E', 'G#', 'B'], 'A': ['A', 'C#', 'E'],
                    'Cmaj7': ['C', 'E', 'G', 'B'], 'Dm7': ['D', 'F', 'A', 'C'], 'G7': ['G', 'B', 'D', 'F']
                };
                
                for(let i=0; i<duration * 4; i++) {
                    const chordIndex = style.pattern[i % style.pattern.length] % style.chords.length;
                    const chord = style.chords[chordIndex];
                    const notes = chordNotes[chord] || [chord, 'C', 'G'];
                    
                    const note = notes[Math.floor(Math.random() * notes.length)];
                    notesList.push(note);
                }
                
                this.displayNotation(notesList);
                this.playMusic(notesList, style.tempo);
                
                return notesList;
            }
            
            displayNotation(notes) {
                this.notationDiv.innerHTML = "";
                const lines = [];
                for(let i=0; i<notes.length; i+=8) {
                    const line = notes.slice(i, i+8).join(' · ');
                    const lineDiv = document.createElement('div');
                    lineDiv.className = 'note-line';
                    lineDiv.textContent = line;
                    this.notationDiv.appendChild(lineDiv);
                }
            }
            
            playMusic(notes, tempo) {
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const duration = 60 / tempo / 2; // четверть
                let time = context.currentTime;
                
                for(let i=0; i<notes.length; i++) {
                    const freq = this.getNoteFreq(notes[i]);
                    if(freq) {
                        const oscillator = context.createOscillator();
                        const gain = context.createGain();
                        oscillator.connect(gain);
                        gain.connect(context.destination);
                        oscillator.frequency.value = freq;
                        oscillator.type = 'sawtooth';
                        gain.gain.setValueAtTime(0.15, time);
                        gain.gain.exponentialRampToValueAtTime(0.0001, time + duration);
                        oscillator.start(time);
                        oscillator.stop(time + duration);
                        
                        // Визуализация
                        this.updateVisualizer(freq);
                    }
                    time += duration;
                }
                
                this.addLog(`✅ Музыка сгенерирована (${notes.length} нот, темп ${tempo} BPM)`);
            }
            
            getNoteFreq(note) {
                const base = note.replace(/\d/, '');
                const octave = parseInt(note.match(/\d/)?.[0] || '4');
                if(this.notes[base]) {
                    return this.notes[base] * Math.pow(2, octave - 4);
                }
                return null;
            }
            
            updateVisualizer(freq) {
                const bars = this.visualizer.children;
                for(let i=0; i<bars.length; i++) {
                    const height = 10 + Math.random() * 60 + (freq / 1000) * 30;
                    bars[i].style.height = Math.min(80, height) + "px";
                }
            }
            
            initVisualizer() {
                this.visualizer.innerHTML = "";
                for(let i=0; i<32; i++) {
                    const bar = document.createElement('div');
                    bar.className = 'bar';
                    bar.style.height = '10px';
                    this.visualizer.appendChild(bar);
                }
            }
            
            updateStats() {
                this.stylesCountSpan.innerText = this.styles.size;
                let totalPatterns = 0;
                for(const style of this.styles.values()) {
                    totalPatterns += style.pattern.length;
                }
                this.patternsCountSpan.innerText = totalPatterns;
            }
            
            addLog(msg, color = "#86efac") {
                const entry = document.createElement('div');
                entry.className = 'log-line';
                entry.style.color = color;
                entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
                this.logDiv.appendChild(entry);
                entry.scrollIntoView({ behavior: "smooth", block: "nearest" });
            }
        }
        
        const nanuMusic = new NanuMusic();
        
        // Вкладки
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`${tab.dataset.tab}-tab`).classList.add('active');
            });
        });
        
        // AI поиск
        document.getElementById('searchStyleBtn').onclick = async () => {
            const style = document.getElementById('aiStyle').value.trim();
            if(!style) return;
            await nanuMusic.searchStyleInInternet(style);
        };
        
        document.getElementById('generateFromAiBtn').onclick = () => {
            const styleName = document.getElementById('aiStyle').value.trim();
            const topic = document.getElementById('songTopic').value.trim() || "музыка";
            const style = nanuMusic.styles.get(styleName.toLowerCase());
            if(!style) {
                nanuMusic.addLog(`❌ Стиль "${styleName}" не найден. Сначала нажми «НАЙТИ СТИЛЬ»`, "#ff8888");
                return;
            }
            nanuMusic.generateLyrics(topic, style);
            nanuMusic.generateMusic(style, 12);
        };
        
        // Свой стиль
        document.getElementById('saveStyleBtn').onclick = () => {
            nanuMusic.saveCustomStyle();
        };
        
        document.getElementById('generateFromCustomBtn').onclick = () => {
            let styleName = document.getElementById('customStyleName').value.trim();
            const topic = document.getElementById('customSongTopic').value.trim() || "музыка";
            
            if(!styleName) {
                const saved = nanuMusic.saveCustomStyle();
                if(saved) styleName = saved.name;
                else return;
            }
            
            const style = nanuMusic.styles.get(styleName.toLowerCase());
            if(!style) {
                nanuMusic.addLog(`❌ Стиль "${styleName}" не найден`, "#ff8888");
                return;
            }
            
            // Обновляем параметры из формы
            style.tempo = parseInt(document.getElementById('tempo').value);
            style.chords = document.getElementById('chords').value.split(/\s+/).filter(c => c.length > 0);
            style.instruments = document.getElementById('instruments').value;
            
            nanuMusic.generateLyrics(topic, style);
            nanuMusic.generateMusic(style, 12);
        };
        
        // Темп слайдер
        document.getElementById('tempo').addEventListener('input', (e) => {
            document.getElementById('tempoValue').innerText = e.target.value;
        });
    })();
</script>
</body>
    </html>
