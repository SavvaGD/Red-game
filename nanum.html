<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanu Music — свои стили, экспорт MP3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1a, #0c1222);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1500px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 25px; }
        h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .sub { color: #8a9bbb; }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab {
            background: #1f2a44;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab.active {
            background: linear-gradient(135deg, #f5576c, #f093fb);
            color: white;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .control-panel {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #2a3a60;
        }
        .flex-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        input, select, textarea {
            background: #0e1625;
            border: 2px solid #2a3a60;
            padding: 12px 20px;
            border-radius: 60px;
            color: white;
            font-size: 0.95rem;
        }
        input { flex: 2; }
        select { flex: 1; }
        textarea {
            width: 100%;
            border-radius: 20px;
            resize: vertical;
        }
        button {
            background: linear-gradient(135deg, #1f3a6b, #0f1a2e);
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button.primary { background: linear-gradient(135deg, #f5576c, #f093fb); }
        button.success { background: linear-gradient(135deg, #10b981, #059669); }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }
        .stat-card {
            background: #0f1625aa;
            border-radius: 20px;
            padding: 10px;
            text-align: center;
        }
        .stat-number { font-size: 1.5rem; font-weight: bold; color: #f093fb; }
        .styles-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .style-card {
            background: #0f1a2e;
            border-radius: 20px;
            padding: 12px;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
        }
        .style-card:hover {
            transform: translateY(-3px);
            border-color: #f5576c;
        }
        .style-card.active-style {
            border-color: #f093fb;
            background: #1a2540;
        }
        .style-name {
            font-weight: bold;
            color: #f093fb;
            margin-bottom: 8px;
        }
        .style-detail {
            font-size: 0.7rem;
            color: #aaa;
        }
        .visualizer {
            background: #00000055;
            border-radius: 16px;
            height: 100px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
        }
        .bar {
            width: 6px;
            background: linear-gradient(180deg, #f093fb, #f5576c);
            border-radius: 3px;
            transition: height 0.05s;
        }
        .notation {
            background: #0f1a2e;
            border-radius: 12px;
            padding: 10px;
            font-family: monospace;
            font-size: 0.7rem;
            max-height: 150px;
            overflow-y: auto;
        }
        .lyrics {
            background: #0f1a2e;
            border-radius: 12px;
            padding: 10px;
            margin-top: 10px;
            font-family: monospace;
            font-size: 0.75rem;
            white-space: pre-wrap;
        }
        audio { width: 100%; margin-top: 15px; }
        .log {
            background: #020617aa;
            border-radius: 16px;
            padding: 12px;
            height: 100px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.7rem;
        }
        .log-line { color: #86efac; border-left: 2px solid #f5576c; padding-left: 8px; margin: 4px 0; }
        @media (max-width: 800px) {
            .styles-gallery { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎵 NANU MUSIC</h1>
        <div class="sub">свои стили · экспорт MP3 · генерация песен</div>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="custom">✍️ МОИ СТИЛИ</div>
        <div class="tab" data-tab="new">➕ НОВЫЙ СТИЛЬ</div>
    </div>

    <!-- Мои стили -->
    <div class="tab-content active" id="custom-tab">
        <div class="control-panel">
            <div class="flex-row">
                <input type="text" id="songTopicCustom" placeholder="Тема песни" value="бунт и свобода">
                <button id="generateCustomBtn" class="success">🎵 СГЕНЕРИРОВАТЬ ПЕСНЮ</button>
                <button id="exportWavBtn" class="primary">💾 СОХРАНИТЬ MP3</button>
            </div>
            <div class="stats">
                <div class="stat-card"><div>🎸 МОИХ СТИЛЕЙ</div><div class="stat-number" id="stylesCount">0</div></div>
            </div>
        </div>
        
        <div class="styles-gallery" id="stylesGallery"></div>
    </div>

    <!-- Создание нового стиля -->
    <div class="tab-content" id="new-tab">
        <div class="control-panel">
            <div class="flex-row">
                <input type="text" id="newStyleName" placeholder="Название стиля" style="flex:1">
                <input type="text" id="newStyleChords" placeholder="Аккорды (C5 G5 A5 F5)" style="flex:2">
            </div>
            <div class="flex-row">
                <label>Темп (BPM):</label>
                <input type="range" id="newStyleTempo" min="60" max="200" value="140" style="flex:1">
                <span id="tempoValue">140</span>
                <label>Инструменты:</label>
                <input type="text" id="newStyleInstruments" placeholder="гитара, барабаны" value="гитара, барабаны" style="flex:2">
            </div>
            <div class="flex-row">
                <button id="saveNewStyleBtn" class="primary">💾 СОХРАНИТЬ СТИЛЬ</button>
            </div>
        </div>
    </div>

    <!-- Результат -->
    <div class="control-panel">
        <div class="visualizer" id="visualizer"></div>
        <div class="notation" id="notation"></div>
        <div class="lyrics" id="lyrics"></div>
        <audio id="audioPlayer" controls></audio>
    </div>

    <div class="log" id="logPanel"></div>
</div>

<script>
    (function(){
        class NanuMusic {
            constructor() {
                this.styles = new Map();     // название -> объект стиля
                this.currentStyle = null;
                this.lastGeneratedBlob = null;
                this.lastNotes = [];
                this.lastLyrics = "";
                
                // DOM
                this.stylesCountSpan = document.getElementById('stylesCount');
                this.stylesGallery = document.getElementById('stylesGallery');
                this.notationDiv = document.getElementById('notation');
                this.lyricsDiv = document.getElementById('lyrics');
                this.visualizer = document.getElementById('visualizer');
                this.audioPlayer = document.getElementById('audioPlayer');
                this.logDiv = document.getElementById('logPanel');
                
                // Ноты
                this.notesMap = {
                    'C': 261.63, 'C#': 277.18, 'D': 293.66, 'D#': 311.13, 'E': 329.63,
                    'F': 349.23, 'F#': 369.99, 'G': 392.00, 'G#': 415.30, 'A': 440.00,
                    'A#': 466.16, 'B': 493.88, 'H': 493.88  // H = B в некоторых системах
                };
                
                this.initVisualizer();
                this.loadStylesFromStorage();
                this.addLog("🎵 NANU MUSIC готова. Создай свой первый стиль!");
            }
            
            initVisualizer() {
                this.visualizer.innerHTML = "";
                for(let i=0; i<32; i++) {
                    const bar = document.createElement('div');
                    bar.className = 'bar';
                    bar.style.height = '10px';
                    this.visualizer.appendChild(bar);
                }
            }
            
            updateVisualizer(freq) {
                const bars = this.visualizer.children;
                for(let i=0; i<bars.length; i++) {
                    const height = 10 + Math.random() * 60 + (freq / 1000) * 30;
                    bars[i].style.height = Math.min(80, height) + "px";
                }
            }
            
            saveStylesToStorage() {
                const data = [];
                for(const [name, style] of this.styles) {
                    data.push({
                        name: style.name,
                        tempo: style.tempo,
                        chords: style.chords,
                        instruments: style.instruments
                    });
                }
                localStorage.setItem('nanu_music_styles', JSON.stringify(data));
            }
            
            loadStylesFromStorage() {
                const saved = localStorage.getItem('nanu_music_styles');
                if(saved) {
                    const data = JSON.parse(saved);
                    for(const s of data) {
                        this.styles.set(s.name.toLowerCase(), {
                            name: s.name,
                            tempo: s.tempo,
                            chords: s.chords,
                            instruments: s.instruments,
                            pattern: [0,1,2,1,0,2,1,0,0,1,2,3,3,2,1,0]
                        });
                    }
                    this.updateStylesGallery();
                    this.updateStats();
                    this.addLog(`📀 Загружено ${this.styles.size} стилей из памяти`);
                }
            }
            
            saveNewStyle() {
                const name = document.getElementById('newStyleName').value.trim();
                if(!name) { this.addLog("❌ Введите название стиля", "#ff8888"); return null; }
                
                const chordsStr = document.getElementById('newStyleChords').value.trim();
                const chords = chordsStr ? chordsStr.split(/\s+/) : ['C5', 'G5', 'A5', 'F5'];
                const tempo = parseInt(document.getElementById('newStyleTempo').value);
                const instruments = document.getElementById('newStyleInstruments').value.trim() || "гитара, барабаны";
                
                const style = {
                    name: name,
                    tempo: tempo,
                    chords: chords,
                    instruments: instruments,
                    pattern: [0,1,2,1,0,2,1,0,0,1,2,3,3,2,1,0]
                };
                
                this.styles.set(name.toLowerCase(), style);
                this.saveStylesToStorage();
                this.updateStylesGallery();
                this.updateStats();
                this.addLog(`✅ Стиль "${name}" сохранён (темп: ${tempo} BPM, аккорды: ${chords.join(', ')})`, "#0f0");
                
                // Очищаем форму
                document.getElementById('newStyleName').value = "";
                document.getElementById('newStyleChords').value = "";
                return style;
            }
            
            updateStylesGallery() {
                this.stylesGallery.innerHTML = "";
                if(this.styles.size === 0) {
                    this.stylesGallery.innerHTML = '<div style="color:#aaa; text-align:center; padding:20px;">Нет стилей. Создайте первый!</div>';
                    return;
                }
                
                for(const [_, style] of this.styles) {
                    const card = document.createElement('div');
                    card.className = 'style-card';
                    if(this.currentStyle && this.currentStyle.name === style.name) {
                        card.classList.add('active-style');
                    }
                    card.innerHTML = `
                        <div class="style-name">🎸 ${style.name}</div>
                        <div class="style-detail">🎚️ ${style.tempo} BPM</div>
                        <div class="style-detail">🎵 ${style.chords.slice(0,4).join(', ')}</div>
                        <div class="style-detail">🥁 ${style.instruments}</div>
                    `;
                    card.onclick = () => {
                        this.currentStyle = style;
                        this.updateStylesGallery();
                        this.addLog(`🎸 Выбран стиль "${style.name}" (${style.tempo} BPM)`);
                    };
                    this.stylesGallery.appendChild(card);
                }
            }
            
            generateLyrics(topic, style) {
                const lyricsTemplates = {
                    'бунт': [
                        "Я не хочу молчать!\nМоё сердце бьётся в такт!\nСвобода — это мой выбор!\nНикто не скажет мне — назад!",
                        "Разбитые стёкла, рваные джинсы,\nГромкая музыка, рваные рифмы.\nМы против системы, мы против оков,\nНаша правда громче всех слов!"
                    ],
                    'любовь': [
                        "Твои глаза как звёзды в ночи,\nЯ слышу сердце, ты не молчи.\nМежду нами только шаг,\nНо я боюсь сделать его."
                    ],
                    'свобода': [
                        "Свобода — это ветер в лицо,\nСвобода — когда бьётся сердце в такт!\nНикто не посадит меня в клетку,\nЯ рождён летать!"
                    ],
                    'какать': [
                        "Хочу какать, хочу какать,\nЭто чувство не унять.\nУтро, вечер или ночь —\nОрганизму не помочь!"
                    ]
                };
                
                let lyrics = "";
                for(const [key, templates] of Object.entries(lyricsTemplates)) {
                    if(topic.toLowerCase().includes(key)) {
                        lyrics = templates[Math.floor(Math.random() * templates.length)];
                        break;
                    }
                }
                
                if(!lyrics) {
                    lyrics = `В ритме ${style.name} я иду вперёд,\n${topic} — вот мой поворот.\nМузыка в сердце, драйв в крови,\nЭто момент настоящей любви!`;
                }
                
                this.lyricsDiv.innerHTML = lyrics;
                this.lastLyrics = lyrics;
                return lyrics;
            }
            
            getNoteFreq(note) {
                // Обработка аккордов типа "C5" -> нота C
                let base = note.replace(/[0-9]/g, '');
                if(base === 'H') base = 'B';
                if(this.notesMap[base]) {
                    return this.notesMap[base];
                }
                return null;
            }
            
            generateMusic(style, duration = 12) {
                this.addLog(`🎸 Генерирую музыку в стиле "${style.name}" (темп: ${style.tempo} BPM)...`);
                
                const notesList = [];
                const chords = style.chords;
                if(!chords || chords.length === 0) {
                    this.addLog("❌ Нет аккордов для генерации", "#ff8888");
                    return [];
                }
                
                for(let i=0; i<duration * 4; i++) {
                    const chordIndex = (style.pattern[i % style.pattern.length]) % chords.length;
                    const chord = chords[chordIndex];
                    const note = chord.replace(/[0-9]/g, '').replace('H', 'B');
                    notesList.push(note || 'C');
                }
                
                this.displayNotation(notesList);
                this.playMusic(notesList, style.tempo);
                this.lastNotes = notesList;
                return notesList;
            }
            
            displayNotation(notes) {
                this.notationDiv.innerHTML = "";
                for(let i=0; i<notes.length; i+=8) {
                    const line = notes.slice(i, i+8).join(' · ');
                    const div = document.createElement('div');
                    div.className = 'notation';
                    div.textContent = line;
                    div.style.margin = '2px 0';
                    div.style.background = 'transparent';
                    div.style.padding = '2px';
                    this.notationDiv.appendChild(div);
                }
            }
            
            playMusic(notes, tempo) {
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const duration = 60 / tempo / 2;
                let time = context.currentTime;
                
                for(let i=0; i<notes.length; i++) {
                    const freq = this.getNoteFreq(notes[i]);
                    if(freq) {
                        const oscillator = context.createOscillator();
                        const gain = context.createGain();
                        oscillator.connect(gain);
                        gain.connect(context.destination);
                        oscillator.frequency.value = freq;
                        oscillator.type = 'sawtooth';
                        gain.gain.setValueAtTime(0.15, time);
                        gain.gain.exponentialRampToValueAtTime(0.0001, time + duration);
                        oscillator.start(time);
                        oscillator.stop(time + duration);
                        this.updateVisualizer(freq);
                    }
                    time += duration;
                }
                
                // Запись для экспорта
                this.recordToWav(notes, tempo, context.sampleRate || 44100);
                this.addLog(`✅ Музыка сгенерирована (${notes.length} нот, темп ${tempo} BPM)`);
            }
            
            async recordToWav(notes, tempo, sampleRate = 44100) {
                const duration = 60 / tempo / 2;
                const totalSamples = Math.ceil(sampleRate * duration * notes.length);
                const samples = new Float32Array(totalSamples);
                
                let sampleIndex = 0;
                for(let i=0; i<notes.length; i++) {
                    const freq = this.getNoteFreq(notes[i]);
                    if(freq) {
                        const samplesPerNote = sampleRate * duration;
                        for(let s=0; s<samplesPerNote && sampleIndex < totalSamples; s++) {
                            const t = s / sampleRate;
                            samples[sampleIndex] = Math.sin(2 * Math.PI * freq * t) * 0.3 * Math.exp(-t * 3);
                            sampleIndex++;
                        }
                    } else {
                        sampleIndex += sampleRate * duration;
                    }
                }
                
                // Конвертируем в WAV
                const wavBuffer = this.samplesToWav(samples, sampleRate);
                this.lastGeneratedBlob = new Blob([wavBuffer], { type: 'audio/wav' });
                const url = URL.createObjectURL(this.lastGeneratedBlob);
                this.audioPlayer.src = url;
            }
            
            samplesToWav(samples, sampleRate) {
                const numChannels = 1;
                const bitDepth = 16;
                const dataLength = samples.length * (bitDepth / 8);
                const bufferLength = 44 + dataLength;
                const buffer = new ArrayBuffer(bufferLength);
                const view = new DataView(buffer);
                
                const writeString = (offset, str) => {
                    for(let i=0; i<str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
                };
                
                writeString(0, 'RIFF');
                view.setUint32(4, bufferLength - 8, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, numChannels, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * numChannels * (bitDepth / 8), true);
                view.setUint16(32, numChannels * (bitDepth / 8), true);
                view.setUint16(34, bitDepth, true);
                writeString(36, 'data');
                view.setUint32(40, dataLength, true);
                
                let offset = 44;
                for(let i=0; i<samples.length; i++) {
                    const sample = Math.max(-1, Math.min(1, samples[i]));
                    const intSample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                    view.setInt16(offset, intSample, true);
                    offset += 2;
                }
                return buffer;
            }
            
            exportWav() {
                if(this.lastGeneratedBlob) {
                    const url = URL.createObjectURL(this.lastGeneratedBlob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `nanu_${this.currentStyle?.name || 'music'}_${Date.now()}.wav`;
                    a.click();
                    URL.revokeObjectURL(url);
                    this.addLog("💾 Файл WAV сохранён", "#0f0");
                } else {
                    this.addLog("❌ Нет сгенерированной музыки для экспорта", "#ff8888");
                }
            }
            
            generateSong() {
                if(!this.currentStyle) {
                    if(this.styles.size > 0) {
                        this.currentStyle = Array.from(this.styles.values())[0];
                        this.updateStylesGallery();
                    } else {
                        this.addLog("❌ Сначала создайте стиль во вкладке «НОВЫЙ СТИЛЬ»", "#ff8888");
                        return;
                    }
                }
                
                const topic = document.getElementById('songTopicCustom').value.trim() || "музыка";
                this.generateLyrics(topic, this.currentStyle);
                this.generateMusic(this.currentStyle, 12);
            }
            
            updateStats() {
                this.stylesCountSpan.innerText = this.styles.size;
            }
            
            addLog(msg, color = "#86efac") {
                const entry = document.createElement('div');
                entry.className = 'log-line';
                entry.style.color = color;
                entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
                this.logDiv.appendChild(entry);
                entry.scrollIntoView({ behavior: "smooth", block: "nearest" });
            }
        }
        
        const nanuMusic = new NanuMusic();
        
        // Вкладки
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`${tab.dataset.tab}-tab`).classList.add('active');
            });
        });
        
        // Кнопки
        document.getElementById('saveNewStyleBtn').onclick = () => nanuMusic.saveNewStyle();
        document.getElementById('generateCustomBtn').onclick = () => nanuMusic.generateSong();
        document.getElementById('exportWavBtn').onclick = () => nanuMusic.exportWav();
        
        // Темп слайдер
        document.getElementById('newStyleTempo').addEventListener('input', (e) => {
            document.getElementById('tempoValue').innerText = e.target.value;
        });
    })();
</script>
</body>
    </html>
