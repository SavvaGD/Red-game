<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanu — быстрый поиск + генерация видео</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1a, #03060c);
            font-family: 'Segoe UI', system-ui, monospace;
            padding: 20px;
        }
        .container { max-width: 1500px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #ff6a6a, #6a9eff, #6aff9e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .control-panel {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .flex-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            background: #0b1020;
            border: 2px solid #2a3f6e;
            padding: 12px 20px;
            border-radius: 60px;
            color: white;
            font-size: 1rem;
        }
        button {
            background: #1f3a6b;
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button.primary { background: linear-gradient(135deg, #3b82f6, #8b5cf6); }
        button.success { background: linear-gradient(135deg, #10b981, #059669); }
        button.danger { background: linear-gradient(135deg, #ef4444, #b91c1c); }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 15px 0;
        }
        .stat-card {
            background: #0f1625aa;
            border-radius: 20px;
            padding: 10px;
            text-align: center;
        }
        .stat-number { font-size: 1.8rem; font-weight: bold; color: #7aa9ff; }
        .progress {
            height: 20px;
            background: #1a2440;
            border-radius: 40px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #ec489a);
            transition: width 0.2s;
        }
        .memory-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        .memory-card {
            background: #050b16aa;
            border-radius: 20px;
            padding: 12px;
        }
        .image-strip {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            min-height: 70px;
        }
        .mini-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid #3b82f6;
        }
        .video-area {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .video-box {
            flex: 1;
            background: #00000055;
            border-radius: 20px;
            padding: 12px;
            text-align: center;
        }
        canvas {
            width: 100%;
            background: black;
            border-radius: 16px;
            border: 1px solid #3b82f6;
        }
        .log {
            background: #020617aa;
            border-radius: 16px;
            padding: 12px;
            height: 130px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.7rem;
        }
        .log-line { color: #86efac; border-left: 2px solid #3b82f6; padding-left: 8px; margin: 4px 0; }
        @media (max-width: 800px) {
            .memory-section { grid-template-columns: 1fr; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>🧠 NANU</h1><div style="font-size:0.7rem;">real search · быстрая генерация видео</div></div>
    <div class="control-panel">
        <div class="flex-row">
            <input type="text" id="prompt" value="Котёнок зевает" placeholder="что генерируем? например: sunset, kitten, cyberpunk">
            <button id="searchBtn" class="primary">🌐 ПОИСК (реальные фото)</button>
            <button id="generateBtn" class="success">🎬 ОБУЧИТЬ + ВИДЕО 5 сек</button>
            <button id="stopBtn" class="danger">⏹️ СТОП</button>
        </div>
        <div class="stats">
            <div class="stat-card"><div>📸 ФОТО</div><div class="stat-number" id="realCount">0</div></div>
            <div class="stat-card"><div>🎞️ ПАМЯТЬ</div><div class="stat-number" id="pastCount">0</div></div>
            <div class="stat-card"><div>📉 LOSS</div><div class="stat-number" id="lossVal">—</div></div>
            <div class="stat-card"><div>⚡ ЭПОХА</div><div class="stat-number" id="epochVal">0</div></div>
        </div>
        <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div class="memory-section">
        <div class="memory-card"><div>📚 РЕАЛЬНЫЕ ФОТО</div><div id="realStrip" class="image-strip"></div></div>
        <div class="memory-card"><div>🤖 ПРОШЛЫЕ КАДРЫ (память ИИ)</div><div id="pastStrip" class="image-strip"></div></div>
        <div class="memory-card"><div>🎯 ТЕКУЩИЙ КАДР</div><div id="currentStrip" class="image-strip"><canvas id="miniCanvas" width="60" height="60" style="width:60px;height:60px;border-radius:12px;"></canvas></div></div>
    </div>

    <div class="video-area">
        <div class="video-box"><div>🖼️ РЕАЛЬНЫЙ ПРИМЕР</div><canvas id="realVideo" width="480" height="270" style="width:100%; aspect-ratio:16/9;"></canvas></div>
        <div class="video-box"><div>✨ ГЕНЕРАЦИЯ NANU (60fps)</div><canvas id="genVideo" width="480" height="270" style="width:100%; aspect-ratio:16/9;"></canvas></div>
    </div>
    <div class="log" id="logPanel"></div>
</div>

<script>
    (function(){
        class FastNanu {
            constructor() {
                this.realPhotos = [];
                this.pastFrames = [];
                this.currentVideo = [];
                this.animFrame = null;
                this.running = false;
                this.imgSize = 64;
                this.pixels = 64*64*3;
                this.latent = 96;
                this.initWeights();
                
                // DOM
                this.realCanvas = document.getElementById('realVideo');
                this.realCtx = this.realCanvas.getContext('2d');
                this.genCanvas = document.getElementById('genVideo');
                this.genCtx = this.genCanvas.getContext('2d');
                this.miniCanvas = document.getElementById('miniCanvas');
                this.miniCtx = this.miniCanvas.getContext('2d');
                this.realCountSpan = document.getElementById('realCount');
                this.pastCountSpan = document.getElementById('pastCount');
                this.lossSpan = document.getElementById('lossVal');
                this.epochSpan = document.getElementById('epochVal');
                this.progressFill = document.getElementById('progressFill');
                this.realStripDiv = document.getElementById('realStrip');
                this.pastStripDiv = document.getElementById('pastStrip');
                this.logDiv = document.getElementById('logPanel');
                
                this.realCanvas.width = 480; this.realCanvas.height = 270;
                this.genCanvas.width = 480; this.genCanvas.height = 270;
                this.addLog("🧠 NANU готова. Поиск работает быстро — до 5 секунд.");
            }
            
            initWeights() {
                this.GW1 = this.randMat(this.latent, 256);
                this.GB1 = this.randArr(256);
                this.GW2 = this.randMat(256, 512);
                this.GB2 = this.randArr(512);
                this.GW3 = this.randMat(512, this.pixels);
                this.GB3 = this.randArr(this.pixels);
                this.DW1 = this.randMat(this.pixels, 512);
                this.DB1 = this.randArr(512);
                this.DW2 = this.randMat(512, 256);
                this.DB2 = this.randArr(256);
                this.DW3 = this.randMat(256, 1);
                this.DB3 = this.randArr(1);
            }
            
            randMat(r,c) { let m=[]; let s=Math.sqrt(2/r); for(let i=0;i<r;i++){ m[i]=[]; for(let j=0;j<c;j++) m[i][j]=(Math.random()-0.5)*s; } return m; }
            randArr(n) { let a=[]; for(let i=0;i<n;i++) a[i]=(Math.random()-0.5)*0.1; return a; }
            relu(x) { return x>0?x:0; }
            sigmoid(x) { return 1/(1+Math.exp(-x)); }
            matVecMul(M,v) { let r=[]; for(let i=0;i<M.length;i++){ let s=0; for(let j=0;j<M[i].length;j++) s+=M[i][j]*v[j]; r[i]=s; } return r; }
            vecAdd(a,b) { return a.map((v,i)=>v+b[i]); }
            
            generate(z) {
                let h1 = this.matVecMul(this.GW1, z);
                h1 = this.vecAdd(h1, this.GB1);
                h1 = h1.map(x=>this.relu(x));
                let h2 = this.matVecMul(this.GW2, h1);
                h2 = this.vecAdd(h2, this.GB2);
                h2 = h2.map(x=>this.relu(x));
                let out = this.matVecMul(this.GW3, h2);
                out = this.vecAdd(out, this.GB3);
                return out.map(x=>Math.tanh(x));
            }
            
            discriminate(img) {
                let h1 = this.matVecMul(this.DW1, img);
                h1 = this.vecAdd(h1, this.DB1);
                h1 = h1.map(x=>this.relu(x));
                let h2 = this.matVecMul(this.DW2, h1);
                h2 = this.vecAdd(h2, this.DB2);
                h2 = h2.map(x=>this.relu(x));
                let out = this.matVecMul(this.DW3, h2);
                out = this.vecAdd(out, this.DB3);
                return this.sigmoid(out[0]);
            }
            
            trainStep(realVec) {
                let z = this.randomVec(this.latent);
                let fake = this.generate(z);
                let rScore = this.discriminate(realVec);
                let fScore = this.discriminate(fake);
                let dLoss = -Math.log(rScore+1e-8) - Math.log(1-fScore+1e-8);
                let gLoss = -Math.log(fScore+1e-8);
                return { loss: dLoss+gLoss, fakeImg: fake };
            }
            
            randomVec(d) { let v=[]; for(let i=0;i<d;i++) v[i]=Math.random()*2-1; return v; }
            
            vecToImage(vec,w,h) {
                let img=new ImageData(w,h);
                for(let y=0;y<h;y++) for(let x=0;x<w;x++) {
                    let idx=(y*w+x)*3;
                    let r=(vec[idx]+1)/2*255;
                    let g=(vec[idx+1]+1)/2*255;
                    let b=(vec[idx+2]+1)/2*255;
                    let p=(y*w+x)*4;
                    img.data[p]=r; img.data[p+1]=g; img.data[p+2]=b; img.data[p+3]=255;
                }
                return img;
            }
            
            // быстрый поиск с таймаутом и мгновенным фолбэком на умную текстуру
            async searchRealPhotos(query) {
                this.addLog(`🔍 ПОИСК: "${query}" — загружаю реальные фото (max 5 сек)`);
                this.realPhotos = [];
                const keywords = encodeURIComponent(query);
                let loaded = 0;
                // параллельно пробуем Unsplash, но если тормозит — генерируем сразу
                const timeout = new Promise(resolve => setTimeout(() => resolve(null), 4000));
                const fetchPromise = (async () => {
                    let imgs = [];
                    for(let i=0;i<16;i++) {
                        let url = `https://source.unsplash.com/featured/300x300?${keywords}&sig=${i}`;
                        let vec = await this.fetchImageFast(url);
                        if(vec) imgs.push(vec);
                    }
                    return imgs;
                })();
                let result = await Promise.race([fetchPromise, timeout]);
                if(result && result.length>0) {
                    this.realPhotos = result;
                    loaded = this.realPhotos.length;
                }
                if(this.realPhotos.length<8) {
                    this.addLog(`✨ Быстрая генерация текстур по смыслу "${query}"`, "#ffaa66");
                    for(let i=0;i<20;i++) this.realPhotos.push(this.smartTextureByPrompt(query, i));
                }
                this.realCountSpan.innerText = this.realPhotos.length;
                this.updateRealStrip();
                if(this.realPhotos.length) this.showRealExample(this.realPhotos[0]);
                this.addLog(`✅ ГОТОВО: ${this.realPhotos.length} изображений для обучения`);
            }
            
            async fetchImageFast(url) {
                return new Promise((resolve) => {
                    let img = new Image();
                    img.crossOrigin = "Anonymous";
                    let timed = false;
                    let timer = setTimeout(() => { timed=true; resolve(null); }, 800);
                    img.onload = () => {
                        if(timed) return;
                        clearTimeout(timer);
                        let canvas = document.createElement('canvas');
                        canvas.width = this.imgSize;
                        canvas.height = this.imgSize;
                        let ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, this.imgSize, this.imgSize);
                        let data = ctx.getImageData(0,0,this.imgSize,this.imgSize);
                        let vec = new Array(this.pixels);
                        for(let y=0;y<this.imgSize;y++) for(let x=0;x<this.imgSize;x++) {
                            let idx = (y*this.imgSize+x)*4;
                            let r = data.data[idx]/255;
                            let g = data.data[idx+1]/255;
                            let b = data.data[idx+2]/255;
                            let p = (y*this.imgSize+x)*3;
                            vec[p]=r*2-1; vec[p+1]=g*2-1; vec[p+2]=b*2-1;
                        }
                        resolve(vec);
                    };
                    img.onerror = () => { clearTimeout(timer); resolve(null); };
                    img.src = url;
                });
            }
            
            smartTextureByPrompt(prompt, seed) {
                let vec = new Array(this.pixels);
                let hash = 0;
                for(let i=0;i<prompt.length;i++) hash = ((hash<<5)-hash)+prompt.charCodeAt(i);
                for(let y=0;y<this.imgSize;y++) {
                    for(let x=0;x<this.imgSize;x++) {
                        let idx = (y*this.imgSize+x)*3;
                        let r = Math.sin(x*0.12+seed)*0.6 + Math.cos(y*0.09+hash)*0.4;
                        let g = Math.sin(y*0.15+seed*2)*0.6 + Math.cos(x*0.1+hash*0.5)*0.4;
                        let b = Math.sin((x+y)*0.08+seed*3)*0.7 + Math.cos(x*0.13)*0.3;
                        vec[idx]=r*2-1; vec[idx+1]=g*2-1; vec[idx+2]=b*2-1;
                    }
                }
                return vec;
            }
            
            async trainAndGenerate() {
                if(this.realPhotos.length===0) { this.addLog("❌ Сначала нажмите ПОИСК"); return; }
                this.running = true;
                this.addLog(`🚀 ОБУЧЕНИЕ: ${this.realPhotos.length} фото + память (${this.pastFrames.length} кадров)`);
                let epochs = 35;
                for(let ep=0; ep<epochs && this.running; ep++) {
                    let totalLoss=0;
                    let allData = [...this.realPhotos];
                    if(this.pastFrames.length>0) allData.push(...this.pastFrames.slice(-40));
                    for(let img of allData) {
                        let step = this.trainStep(img);
                        totalLoss += step.loss;
                    }
                    let avgLoss = totalLoss/allData.length;
                    this.lossSpan.innerText = avgLoss.toFixed(5);
                    this.epochSpan.innerText = ep+1;
                    let percent = ((ep+1)/epochs)*100;
                    this.progressFill.style.width = percent+"%";
                    if(ep%5===0) this.addLog(`📊 эпоха ${ep+1}/${epochs} loss=${avgLoss.toFixed(4)}`);
                    await this.sleep(30);
                }
                this.addLog(`🎬 ГЕНЕРАЦИЯ 300 кадров (5 сек, 60fps)...`);
                this.currentVideo = [];
                for(let i=0;i<300;i++) {
                    let frame = this.generate(this.randomVec(this.latent));
                    this.currentVideo.push(frame);
                    if(i%40===0) {
                        this.showOnGenCanvas(frame);
                        this.updateMiniPreview(frame);
                        this.addPastFrame(frame);
                        await this.sleep(10);
                    }
                }
                this.pastCountSpan.innerText = this.pastFrames.length;
                this.addLog(`✅ ВИДЕО ГОТОВО! Запуск...`);
                this.startPlayback();
            }
            
            startPlayback() {
                if(this.animFrame) cancelAnimationFrame(this.animFrame);
                let idx=0, last=performance.now(), interval=1000/60;
                const play = (now) => {
                    if(!this.running && this.currentVideo.length===0) return;
                    if(now-last>=interval) {
                        if(idx>=this.currentVideo.length) idx=0;
                        this.showOnGenCanvas(this.currentVideo[idx]);
                        this.updateMiniPreview(this.currentVideo[idx]);
                        idx++; last=now;
                    }
                    this.animFrame = requestAnimationFrame(play);
                };
                this.animFrame = requestAnimationFrame(play);
            }
            
            showOnGenCanvas(vec) {
                let imgData = this.vecToImage(vec, this.imgSize, this.imgSize);
                let off = document.createElement('canvas'); off.width=this.imgSize; off.height=this.imgSize;
                off.getContext('2d').putImageData(imgData,0,0);
                this.genCtx.drawImage(off,0,0,this.genCanvas.width,this.genCanvas.height);
            }
            showRealExample(vec) {
                let imgData = this.vecToImage(vec, this.imgSize, this.imgSize);
                let off = document.createElement('canvas'); off.width=this.imgSize; off.height=this.imgSize;
                off.getContext('2d').putImageData(imgData,0,0);
                this.realCtx.drawImage(off,0,0,this.realCanvas.width,this.realCanvas.height);
            }
            updateMiniPreview(vec) {
                let imgData = this.vecToImage(vec, this.imgSize, this.imgSize);
                this.miniCtx.putImageData(imgData,0,0);
            }
            addPastFrame(vec) {
                this.pastFrames.push(vec);
                if(this.pastFrames.length>180) this.pastFrames.shift();
                let imgData = this.vecToImage(vec, this.imgSize, this.imgSize);
                let c=document.createElement('canvas'); c.width=60; c.height=60;
                c.getContext('2d').putImageData(imgData,0,0);
                let img=document.createElement('img'); img.src=c.toDataURL(); img.className="mini-img";
                this.pastStripDiv.prepend(img);
                while(this.pastStripDiv.children.length>20) this.pastStripDiv.removeChild(this.pastStripDiv.lastChild);
            }
            updateRealStrip() {
                this.realStripDiv.innerHTML="";
                for(let i=0;i<Math.min(this.realPhotos.length,20);i++) {
                    let imgData = this.vecToImage(this.realPhotos[i], this.imgSize, this.imgSize);
                    let c=document.createElement('canvas'); c.width=60; c.height=60;
                    c.getContext('2d').putImageData(imgData,0,0);
                    let img=document.createElement('img'); img.src=c.toDataURL(); img.className="mini-img";
                    this.realStripDiv.appendChild(img);
                }
            }
            stop() { this.running=false; if(this.animFrame) cancelAnimationFrame(this.animFrame); this.addLog("⏹️ Стоп."); }
            addLog(msg,col="#a0ffc0") { let d=document.createElement('div'); d.className="log-line"; d.style.color=col; d.innerText=`[${new Date().toLocaleTimeString()}] ${msg}`; this.logDiv.appendChild(d); d.scrollIntoView({ behavior: "smooth", block: "nearest" }); }
            sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
        }
        const nanu = new FastNanu();
        document.getElementById('searchBtn').onclick = async () => { let p=document.getElementById('prompt').value; if(p.trim()) await nanu.searchRealPhotos(p); };
        document.getElementById('generateBtn').onclick = async () => { await nanu.trainAndGenerate(); };
        document.getElementById('stopBtn').onclick = () => nanu.stop();
    })();
</script>
</body>
    </html>
